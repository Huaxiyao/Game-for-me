<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>数独</title>
<style>
:root {
  --bg: #f0f4ff; --bg2: #e8edf5; --surface: #fff;
  --text: #1e293b; --text2: #94a3b8;
  --pri: #6366f1; --pri-light: #eef2ff; --pri-dark: #4f46e5;
  --red: #ef4444; --red-bg: #fef2f2; --green: #10b981; --green-bg: #d1fae5;
  --border: #e2e8f0; --box-border: #94a3b8;
  --shadow: 0 8px 30px rgba(0,0,0,.06);
  --cell: 48px; --lw: 24px; --lh: 20px; --gap: 5px;
}
.dark {
  --bg: #0f172a; --bg2: #1e293b; --surface: #1e293b;
  --text: #e2e8f0; --text2: #64748b;
  --pri: #818cf8; --pri-light: #1e1b4b; --pri-dark: #6366f1;
  --red: #f87171; --red-bg: #450a0a; --green: #34d399; --green-bg: #064e3b;
  --border: #334155; --box-border: #475569;
  --shadow: 0 8px 30px rgba(0,0,0,.3);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  min-height: 100vh; min-height: 100dvh;
  background: linear-gradient(155deg, var(--bg), var(--bg2));
  display: flex; justify-content: center; align-items: flex-start;
  user-select: none; -webkit-user-select: none;
  padding: 8px 0 20px; overflow-y: auto;
}
.container { max-width: 520px; width: 100%; padding: 12px 12px 10px; }

.top-bar {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 2px;
}
.top-bar h1 { font-size: 20px; font-weight: 700; color: var(--text); }
.top-right { display: flex; align-items: center; gap: 8px; }
.top-right select {
  padding: 3px 10px; border: 1.5px solid var(--border); border-radius: 8px;
  font-size: 12px; font-weight: 600; background: var(--surface); color: var(--text);
  outline: none; cursor: pointer;
}
.top-right select:focus { border-color: var(--pri); }
.theme-btn {
  width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid var(--border);
  background: var(--surface); font-size: 14px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s;
}
.theme-btn:hover { background: var(--pri-light); border-color: var(--pri); }

.info-row {
  display: flex; justify-content: center; gap: 10px; margin-bottom: 6px;
  flex-wrap: wrap; align-items: center;
}
.info-item {
  font-size: 11px; color: var(--text2);
  display: flex; align-items: center; gap: 3px;
}
.info-item b { color: var(--text); font-weight: 600; }
.info-item input { width: 13px; height: 13px; accent-color: var(--pri); }

.grid-wrap { display: flex; flex-direction: column; align-items: center; }
.col-labels { display: flex; padding-left: var(--lw); }
.col-labels span {
  width: var(--cell); height: var(--lh);
  display: flex; align-items: center; justify-content: center;
  font-size: var(--fsm); font-weight: 600; color: var(--text2);
}
.grid-row { display: flex; align-items: stretch; }
.row-label {
  width: var(--lw);
  display: flex; align-items: center; justify-content: center;
  font-size: var(--fsm); font-weight: 600; color: var(--text2);
}
.grid {
  display: grid;
  grid-template-columns: repeat(9, var(--cell));
  grid-template-rows: repeat(9, var(--cell));
  border: 3px solid var(--box-border); border-radius: 6px;
  box-shadow: var(--shadow); overflow: hidden;
}
.cell {
  display: flex; align-items: center; justify-content: center;
  font-size: var(--fs); font-weight: 600; cursor: pointer;
  color: var(--text); transition: background .06s;
  position: relative; border: 0.5px solid #cbd5e1;
  background: var(--surface); width: var(--cell); height: var(--cell);
}
.dark .cell { border-color: #334455; }
.cell:hover { background: #f1f5f9; }
.cell.given { color: var(--pri); font-weight: 700; cursor: default; }
.cell.given:hover { background: var(--pri-light); }
.cell.selected { box-shadow: inset 0 0 0 3px var(--pri)!important; z-index: 2; }
.cell.hl-num { background: #dbeafe; }
.dark .cell.hl-num { background: #1e3a5f; }
.cell.hl-rel { background: #eef2ff; }
.dark .cell.hl-rel { background: #162032; }
.cell.conflict { background: var(--red-bg)!important; color: var(--red)!important; }
.cell.conflict.given { color: var(--red)!important; }
.cell.br { border-right: 3px solid var(--box-border)!important; }
.cell.bb { border-bottom: 3px solid var(--box-border)!important; }
.cell.pop { animation: popIn .25s cubic-bezier(0.34, 1.56, 0.64, 1); }
@keyframes popIn {
  0% { transform: scale(.4); opacity: 0; }
  60% { transform: scale(1.12); }
  100% { transform: scale(1); opacity: 1; }
}
.cell.flash-num { animation: flashNum .4s ease; }
@keyframes flashNum { 0% { background: #bfdbfe; } 100% {} }
.cell.celebrate { animation: celebrate .6s ease; }
@keyframes celebrate {
  0% { background: var(--green-bg); }
  50% { background: #a7f3d0; }
  100% {}
}
.cell .notes {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(3, 1fr);
  position: absolute; inset: 1px;
}
.cell .notes span {
  font-size: var(--fsn); font-weight: 500; color: var(--text2);
  display: flex; align-items: center; justify-content: center; line-height: 1;
}

.menu-row { display: flex; gap: 5px; justify-content: center; margin-top: 10px; flex-wrap: nowrap; }
.menu-btn {
  flex: 1; padding: 8px 6px; border-radius: 20px;
  border: 1.5px solid var(--border); background: var(--surface);
  color: var(--text2); font-size: var(--fsm); font-weight: 600;
  cursor: pointer; transition: all .15s;
  white-space: nowrap; text-align: center;
}
.menu-btn:hover {
  transform: translateY(-1px); box-shadow: 0 3px 10px rgba(0,0,0,.06);
  border-color: var(--pri);
}
.menu-btn:active { transform: scale(.96); }
.menu-btn.active { background: var(--pri); color: #fff; border-color: var(--pri); }
.menu-btn.undo { color: #ef4444; border-color: #fecaca; }
.menu-btn.undo:hover { background: var(--red-bg); border-color: #ef4444; }
.menu-btn.erase { color: #ef4444; border-color: #fecaca; }
.menu-btn.erase:hover { background: var(--red-bg); border-color: #ef4444; }
.menu-btn.hint { color: #10b981; border-color: #a7f3d0; }
.menu-btn.hint:hover { background: var(--green-bg); border-color: #10b981; }
.menu-btn.disabled { opacity: .35; cursor: default; pointer-events: none; }

.num-pad { display: flex; gap: 5px; justify-content: center; margin-top: 10px; }
.num-card {
  flex: 1; max-width: var(--nb); min-width: 30px; border-radius: 12px;
  border: 2px solid var(--border); background: var(--surface); cursor: pointer;
  transition: all .15s;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 6px 2px 4px; gap: 0;
}
.num-card:hover {
  transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,0,0,.08);
  border-color: var(--pri);
}
.num-card:active { transform: scale(.93); }
.num-card .num-big {
  font-size: var(--nbs); font-weight: 700; color: var(--text); line-height: 1;
}
.num-card .num-cnt {
  font-size: var(--nbc); font-weight: 600; color: var(--text2); line-height: 1;
}
.num-card.done {
  border-color: #a7f3d0; background: var(--green-bg);
  cursor: default; pointer-events: none;
}
.num-card.done .num-big { color: var(--green); }
.num-card.done .num-cnt { color: var(--green); }

.best-bar {
  display: flex; justify-content: center; gap: 5px; margin-top: 8px;
  flex-wrap: wrap;
}
.best-item {
  font-size: 10px; color: var(--text2); background: var(--surface);
  padding: 2px 10px; border-radius: 8px; border: 1px solid var(--border);
}
.best-item b { color: var(--pri); font-weight: 600; }

.btn-row { display: flex; gap: 8px; justify-content: center; margin-top: 8px; }
.btn {
  padding: 7px 20px; border-radius: 12px; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all .2s;
  color: var(--text2); background: var(--surface); border: 1px solid var(--border);
}
.btn:hover { background: var(--pri-light); color: var(--pri); }
.btn.primary { background: var(--pri); color: #fff; border-color: var(--pri); }
.btn.primary:hover { background: var(--pri-dark); }

.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.55);
  display: flex; align-items: center; justify-content: center;
  z-index: 100; animation: fadeIn .3s forwards;
}
@keyframes fadeIn { to { opacity: 1; } }
.overlay-box {
  background: var(--surface); border-radius: 24px; padding: 32px 36px;
  text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,.2);
  animation: slideUp .5s cubic-bezier(0.34, 1.56, 0.64, 1);
  max-width: 320px; width: 90%;
}
@keyframes slideUp {
  from { transform: translateY(40px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
.overlay-box .stars { font-size: 28px; margin-bottom: 2px; letter-spacing: 4px; }
.overlay-box h2 { font-size: 26px; color: var(--text); margin-bottom: 2px; }
.overlay-box p { font-size: 14px; color: var(--text2); margin-bottom: 16px; line-height: 1.6; }
.overlay-box .btn { padding: 10px 36px; font-size: 15px; }
.overlay-box .btn-row { margin-top: 12px; gap: 10px; }
.overlay-box .btn-row .btn { padding: 9px 24px; font-size: 14px; }

.confetti { position: fixed; pointer-events: none; z-index: 200; }
.confetti-piece {
  position: absolute; width: 8px; height: 8px; border-radius: 2px;
  animation: confettiFall 2s ease-out forwards;
}
@keyframes confettiFall {
  0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg) scale(0); opacity: 0; }
}

@media (max-width: 520px) {
  .container { padding: 6px 4px 8px; }
  .info-row { gap: 6px; }
  .info-item { font-size: 10px; }
}
</style>
</head>
<body>
<div class="container">
  <div class="top-bar">
    <h1>数独</h1>
    <div class="top-right">
      <select id="level">
        <option value="easy">简单</option>
        <option value="medium" selected>中等</option>
        <option value="hard">困难</option>
      </select>
      <button class="theme-btn" id="themeBtn">🌙</button>
    </div>
  </div>

  <div class="info-row">
    <span class="info-item">⏱ <b id="timer">00:00</b></span>
    <span class="info-item">剩余 <b id="remain">0</b></span>
    <span class="info-item">错误 <b id="errLabel">0</b></span>
    <span class="info-item">提示 <b id="hintLabel">3次</b></span>
    <label class="info-item" style="cursor: pointer">
      <input type="checkbox" id="autoCheck" checked>实时检查
    </label>
  </div>

  <div class="grid-wrap">
    <div class="col-labels" id="colLabels"></div>
    <div id="gridContainer"></div>
  </div>

  <div class="menu-row">
    <button class="menu-btn undo" id="undoBtn">撤销</button>
    <button class="menu-btn erase" id="eraseBtn">擦除</button>
    <button class="menu-btn active" id="modeBtn">备注</button>
    <button class="menu-btn" id="autoNote">一键备注</button>
    <button class="menu-btn hint" id="hintBtn">智能提示</button>
  </div>

  <div class="num-pad" id="numPad"></div>

  <div class="best-bar" id="bestBar"></div>
  <div class="btn-row">
    <button class="btn" id="pauseBtn">⏯ 暂停</button>
    <button class="btn primary" id="newGame">新游戏</button>
  </div>
</div>

<script>
// ============================================================
// 数独核心引擎（纯逻辑，无状态依赖）
// ============================================================
class SudokuEngine {
  static isValidPlacement(board, r, c, n) {
    if (n === 0) return true;
    for (let i = 0; i < 9; i++) {
      if (board[r][i] === n || board[i][c] === n) return false;
    }
    const boxR = Math.floor(r / 3) * 3;
    const boxC = Math.floor(c / 3) * 3;
    for (let dr = 0; dr < 3; dr++) {
      for (let dc = 0; dc < 3; dc++) {
        if (board[boxR + dr][boxC + dc] === n) return false;
      }
    }
    return true;
  }

  static getCandidates(board, r, c) {
    if (board[r][c] !== 0) return [];
    const used = new Set();
    for (let i = 0; i < 9; i++) {
      if (board[r][i]) used.add(board[r][i]);
      if (board[i][c]) used.add(board[i][c]);
    }
    const boxR = Math.floor(r / 3) * 3;
    const boxC = Math.floor(c / 3) * 3;
    for (let dr = 0; dr < 3; dr++) {
      for (let dc = 0; dc < 3; dc++) {
        const v = board[boxR + dr][boxC + dc];
        if (v) used.add(v);
      }
    }
    return [1, 2, 3, 4, 5, 6, 7, 8, 9].filter(n => !used.has(n));
  }

  static solve(board) {
    const shuffle = (a) => {
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    };

    const dfs = () => {
      for (let r = 0; r < 9; r++) {
        for (let c = 0; c < 9; c++) {
          if (board[r][c] === 0) {
            for (const n of shuffle([1, 2, 3, 4, 5, 6, 7, 8, 9])) {
              if (SudokuEngine.isValidPlacement(board, r, c, n)) {
                board[r][c] = n;
                if (dfs()) return true;
                board[r][c] = 0;
              }
            }
            return false;
          }
        }
      }
      return true;
    };
    return dfs();
  }

  static countSolutions(board, limit = 2) {
    let count = 0;

    const dfs = () => {
      if (count >= limit) return;
      let minR = -1, minC = -1, minCands = null, minLen = 10;
      for (let r = 0; r < 9; r++) {
        for (let c = 0; c < 9; c++) {
          if (board[r][c] === 0) {
            const cands = SudokuEngine.getCandidates(board, r, c);
            if (cands.length === 0) return;
            if (cands.length < minLen) {
              minLen = cands.length;
              minR = r; minC = c; minCands = cands;
              if (minLen === 1) break;
            }
          }
        }
        if (minLen === 1) break;
      }
      if (minR === -1) { count++; return; }
      for (const n of minCands) {
        board[minR][minC] = n;
        dfs();
        board[minR][minC] = 0;
        if (count >= limit) return;
      }
    };

    dfs();
    return count;
  }

  static generatePuzzle(difficulty) {
    const targetEmpty = { easy: 38, medium: 46, hard: 54 }[difficulty] || 46;

    const board = Array.from({ length: 9 }, () => Array(9).fill(0));
    SudokuEngine.solve(board);
    const solution = board.map(row => [...row]);

    const positions = Array.from({ length: 81 }, (_, i) => ({
      r: Math.floor(i / 9), c: i % 9
    }));
    for (let i = positions.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [positions[i], positions[j]] = [positions[j], positions[i]];
    }

    const puzzle = solution.map(row => [...row]);
    const given = Array.from({ length: 9 }, () => Array(9).fill(true));
    let removed = 0;

    for (const pos of positions) {
      if (removed >= targetEmpty) break;
      const backup = puzzle[pos.r][pos.c];
      puzzle[pos.r][pos.c] = 0;
      const testBoard = puzzle.map(row => [...row]);
      if (SudokuEngine.countSolutions(testBoard, 2) === 1) {
        given[pos.r][pos.c] = false;
        removed++;
      } else {
        puzzle[pos.r][pos.c] = backup;
      }
    }

    return { puzzle, solution, given };
  }

  static isLineComplete(player, solution, type, a, b) {
    if (type === 'row') {
      for (let c = 0; c < 9; c++) {
        if (player[a][c] !== solution[a][c]) return false;
      }
      return true;
    }
    if (type === 'col') {
      for (let r = 0; r < 9; r++) {
        if (player[r][a] !== solution[r][a]) return false;
      }
      return true;
    }
    if (type === 'box') {
      for (let dr = 0; dr < 3; dr++) {
        for (let dc = 0; dc < 3; dc++) {
          if (player[a + dr][b + dc] !== solution[a + dr][b + dc]) return false;
        }
      }
      return true;
    }
    return false;
  }
}

// ============================================================
// 游戏状态管理（含脏标记和计数器）
// ============================================================
class GameState {
  constructor() {
    this.reset();
  }

  reset() {
    this.solution = null;
    this.puzzle = null;
    this.given = null;
    this.player = null;
    this.notes = null;
    this.history = [];
    this.errors = 0;
    this.hintsLeft = 3;
    this.level = 'medium';
    this.noteMode = false;
    this.autoCheck = true;
    this.remaining = 0;
    this.numCounts = Array(10).fill(0);
    this.numPositions = Array.from({ length: 10 }, () => new Set());
    this.dirtyCells = null;
  }

  initFromPuzzle(puzzle, solution, given, level) {
    this.solution = solution;
    this.puzzle = puzzle.map(row => [...row]);
    this.given = given.map(row => [...row]);
    this.player = puzzle.map(row => [...row]);
    this.notes = Array.from({ length: 9 }, () =>
      Array.from({ length: 9 }, () => new Set())
    );
    this.history = [];
    this.errors = 0;
    this.hintsLeft = 3;
    this.level = level;
    this.noteMode = false;
    this.autoCheck = true;
    this.dirtyCells = new Set();
    this.rebuildCounters();
  }

  rebuildCounters() {
    this.remaining = 0;
    this.numCounts = Array(10).fill(0);
    this.numPositions = Array.from({ length: 10 }, () => new Set());
    for (let r = 0; r < 9; r++) {
      for (let c = 0; c < 9; c++) {
        const v = this.player[r][c];
        if (v === 0) {
          this.remaining++;
        } else {
          this.numCounts[v]++;
          this.numPositions[v].add(r * 9 + c);
        }
      }
    }
  }

  markDirty(r, c) {
    if (this.dirtyCells) this.dirtyCells.add(r * 9 + c);
  }

  getConflicts(r, c, n) {
    if (n === 0) return [];
    const conflicts = [];
    for (let i = 0; i < 9; i++) {
      if (i !== c && this.player[r][i] === n) conflicts.push([r, i]);
      if (i !== r && this.player[i][c] === n) conflicts.push([i, c]);
    }
    const boxR = Math.floor(r / 3) * 3;
    const boxC = Math.floor(c / 3) * 3;
    for (let dr = 0; dr < 3; dr++) {
      for (let dc = 0; dc < 3; dc++) {
        const nr = boxR + dr, nc = boxC + dc;
        if ((nr !== r || nc !== c) && this.player[nr][nc] === n) {
          conflicts.push([nr, nc]);
        }
      }
    }
    return conflicts;
  }

  placeNumber(r, c, n) {
    if (this.given[r][c]) return;

    if (this.noteMode && n > 0) {
      const prevNotes = new Set(this.notes[r][c]);
      if (this.notes[r][c].has(n)) {
        this.notes[r][c].delete(n);
      } else {
        this.notes[r][c].add(n);
      }
      this.player[r][c] = 0;
      this.history.push({ type: 'note', r, c, val: n, prevNotes });
      this.markDirty(r, c);
    } else {
      const prev = this.player[r][c];
      const prevNotes = new Set(this.notes[r][c]);
      const prevErrors = this.errors;

      if (prev !== 0) {
        this.numCounts[prev]--;
        this.numPositions[prev].delete(r * 9 + c);
        this.remaining++;
      }

      this.player[r][c] = n;
      this.notes[r][c] = new Set();

      if (n > 0) {
        this.numCounts[n]++;
        this.numPositions[n].add(r * 9 + c);
        this.remaining--;
        this.clearNotesFor(n, r, c);
        if (this.autoCheck && n !== this.solution[r][c]) {
          this.errors++;
        }
      }

      this.history.push({ type: 'place', r, c, prev, prevNotes, prevErrors });
      this.markDirty(r, c);
    }
  }

  clearNotesFor(n, r, c) {
    for (let i = 0; i < 9; i++) {
      this.notes[r][i].delete(n);
      this.notes[i][c].delete(n);
    }
    const boxR = Math.floor(r / 3) * 3;
    const boxC = Math.floor(c / 3) * 3;
    for (let dr = 0; dr < 3; dr++) {
      for (let dc = 0; dc < 3; dc++) {
        this.notes[boxR + dr][boxC + dc].delete(n);
      }
    }
  }

  undo() {
    if (this.history.length === 0) return null;
    const h = this.history.pop();
    if (h.type === 'note') {
      this.notes[h.r][h.c] = h.prevNotes;
      this.player[h.r][h.c] = 0;
    } else {
      const cur = this.player[h.r][h.c];
      if (cur !== 0) {
        this.numCounts[cur]--;
        this.numPositions[cur].delete(h.r * 9 + h.c);
        this.remaining++;
      }
      this.player[h.r][h.c] = h.prev;
      this.notes[h.r][h.c] = h.prevNotes;
      this.errors = h.prevErrors;
      if (h.prev !== 0) {
        this.numCounts[h.prev]++;
        this.numPositions[h.prev].add(h.r * 9 + h.c);
        this.remaining--;
      }
    }
    this.markDirty(h.r, h.c);
    return h;
  }

  autoFillNotes() {
    let filled = 0;
    for (let r = 0; r < 9; r++) {
      for (let c = 0; c < 9; c++) {
        if (this.player[r][c] === 0 && this.notes[r][c].size === 0) {
          const cands = SudokuEngine.getCandidates(this.player, r, c);
          if (cands.length > 0) {
            cands.forEach(n => this.notes[r][c].add(n));
            filled++;
            this.markDirty(r, c);
          }
        }
      }
    }
    return filled;
  }

  useHint(r, c) {
    if (this.given[r][c]) return false;
    if (this.player[r][c] === this.solution[r][c]) return false;

    const prev = this.player[r][c];
    const prevNotes = new Set(this.notes[r][c]);
    const prevErrors = this.errors;

    if (prev !== 0) {
      this.numCounts[prev]--;
      this.numPositions[prev].delete(r * 9 + c);
      this.remaining++;
    }

    const correct = this.solution[r][c];
    this.player[r][c] = correct;
    this.notes[r][c] = new Set();
    this.numCounts[correct]++;
    this.numPositions[correct].add(r * 9 + c);
    this.remaining--;
    this.clearNotesFor(correct, r, c);
    this.hintsLeft--;
    this.history.push({ type: 'place', r, c, prev, prevNotes, prevErrors });
    this.markDirty(r, c);
    return true;
  }

  checkWin() {
    return this.remaining === 0;
  }
}

// ============================================================
// DOM 渲染器（支持脏标记增量更新）
// ============================================================
class Renderer {
  constructor() {
    this.gridContainer = document.getElementById('gridContainer');
    this.numPad = document.getElementById('numPad');
    this.colLabels = document.getElementById('colLabels');
    this.bestBar = document.getElementById('bestBar');
    this.timerEl = document.getElementById('timer');
    this.remainEl = document.getElementById('remain');
    this.hintLabel = document.getElementById('hintLabel');
    this.errLabel = document.getElementById('errLabel');
    this.modeBtn = document.getElementById('modeBtn');
    this.undoBtn = document.getElementById('undoBtn');
    this.hintBtn = document.getElementById('hintBtn');
    this.pauseBtn = document.getElementById('pauseBtn');

    this.cells = [];
    this.numCards = [];
    this.lastPlaced = { r: -1, c: -1 };
    this.highlightNum = 0;
  }

  initGrid(onCellClick) {
    this.gridContainer.innerHTML = '';
    this.cells = [];

    for (let r = 0; r < 9; r++) {
      const row = document.createElement('div');
      row.className = 'grid-row';

      const rowLabel = document.createElement('div');
      rowLabel.className = 'row-label';
      rowLabel.textContent = String.fromCharCode(65 + r);
      row.appendChild(rowLabel);

      const rowCells = [];
      for (let c = 0; c < 9; c++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        if (c % 3 === 2 && c < 8) cell.classList.add('br');
        if (r % 3 === 2 && r < 8) cell.classList.add('bb');
        cell.addEventListener('click', () => onCellClick(r, c));
        row.appendChild(cell);
        rowCells.push(cell);
      }
      this.gridContainer.appendChild(row);
      this.cells.push(rowCells);
    }
  }

  updateCell(r, c, state, selectedR, selectedC, highlightNum, autoCheck) {
    const cell = this.cells[r][c];
    const isGiven = state.given[r][c];
    const value = state.player[r][c];

    cell.classList.remove('given', 'selected', 'hl-num', 'hl-rel', 'conflict', 'pop');
    cell.innerHTML = '';

    if (isGiven) cell.classList.add('given');

    if (r === selectedR && c === selectedC) {
      cell.classList.add('selected');
    } else {
      const activeNum = highlightNum || (selectedR >= 0 ? state.player[selectedR][selectedC] : 0);
      if (activeNum > 0 && value === activeNum) {
        cell.classList.add('hl-num');
      } else if (activeNum > 0 && selectedR >= 0) {
        const inSameRow = r === selectedR;
        const inSameCol = c === selectedC;
        const inSameBox = Math.floor(r / 3) === Math.floor(selectedR / 3) &&
                          Math.floor(c / 3) === Math.floor(selectedC / 3);
        if ((inSameRow || inSameCol || inSameBox) && value === 0) {
          cell.classList.add('hl-rel');
        }
      }
    }

    if (autoCheck && selectedR >= 0) {
      const activeNum = highlightNum || state.player[selectedR][selectedC];
      if (activeNum > 0) {
        const conflicts = state.getConflicts(selectedR, selectedC, activeNum);
        const conflictSet = new Set(conflicts.map(([rr, cc]) => rr * 9 + cc));
        conflictSet.add(selectedR * 9 + selectedC);
        if (conflictSet.has(r * 9 + c)) {
          cell.classList.add('conflict');
        }
      }
    }

    if (r === this.lastPlaced.r && c === this.lastPlaced.c) {
      cell.classList.add('pop');
    }

    if (value !== 0) {
      cell.textContent = value;
    } else if (state.notes[r][c].size > 0) {
      const notesDiv = document.createElement('div');
      notesDiv.className = 'notes';
      for (let n = 1; n <= 9; n++) {
        const span = document.createElement('span');
        span.textContent = state.notes[r][c].has(n) ? n : '';
        notesDiv.appendChild(span);
      }
      cell.appendChild(notesDiv);
    }
  }

  renderGrid(state, selectedR, selectedC, highlightNum, autoCheck, lastPlaced) {
    this.lastPlaced = lastPlaced || { r: -1, c: -1 };
    for (let r = 0; r < 9; r++) {
      for (let c = 0; c < 9; c++) {
        this.updateCell(r, c, state, selectedR, selectedC, highlightNum, autoCheck);
      }
    }
    if (state.dirtyCells) state.dirtyCells.clear();
  }

  renderDirtyCells(state, selectedR, selectedC, highlightNum, autoCheck, lastPlaced) {
    this.lastPlaced = lastPlaced || { r: -1, c: -1 };
    const dirty = state.dirtyCells;
    if (!dirty || dirty.size === 0) return;

    const needFullUpdate = selectedR >= 0;
    if (needFullUpdate) {
      this.renderGrid(state, selectedR, selectedC, highlightNum, autoCheck, lastPlaced);
      return;
    }

    for (const idx of dirty) {
      const r = Math.floor(idx / 9);
      const c = idx % 9;
      this.updateCell(r, c, state, selectedR, selectedC, highlightNum, autoCheck);
    }
    dirty.clear();
  }

  renderNumPad(state) {
    this.numPad.innerHTML = '';
    this.numCards = [];

    for (let n = 1; n <= 9; n++) {
      const remaining = 9 - state.numCounts[n];
      const card = document.createElement('button');
      card.className = 'num-card';
      if (remaining <= 0) card.classList.add('done');
      card.innerHTML = `<span class="num-big">${n}</span><span class="num-cnt">${remaining <= 0 ? '✓' : remaining}</span>`;
      card.dataset.n = n;
      this.numCards.push(card);
      this.numPad.appendChild(card);
    }
  }

  updateNumPad(state) {
    for (let n = 1; n <= 9; n++) {
      const card = this.numCards[n - 1];
      const remaining = 9 - state.numCounts[n];
      const isDone = remaining <= 0;
      card.classList.toggle('done', isDone);
      card.querySelector('.num-cnt').textContent = isDone ? '✓' : remaining;
    }
  }

  renderColLabels() {
    this.colLabels.innerHTML = '';
    for (let c = 1; c <= 9; c++) {
      const span = document.createElement('span');
      span.textContent = c;
      this.colLabels.appendChild(span);
    }
  }

  renderBest(bestRecords) {
    const entries = Object.entries(bestRecords).filter(([, t]) => t !== undefined);
    if (entries.length === 0) { this.bestBar.innerHTML = ''; return; }
    const names = { easy: '简单', medium: '中等', hard: '困难' };
    this.bestBar.innerHTML = entries.map(([level, time]) => {
      const m = Math.floor(time / 60);
      const s = time % 60;
      return `<span class="best-item">${names[level]}最佳 <b>${m}:${String(s).padStart(2, '0')}</b></span>`;
    }).join('');
  }

  updateMenuState(hasHistory, hintsLeft) {
    this.undoBtn.classList.toggle('disabled', !hasHistory);
    this.hintBtn.classList.toggle('disabled', hintsLeft <= 0);
  }

  updateModeBtn(noteMode) {
    this.modeBtn.textContent = noteMode ? '填入' : '备注';
    this.modeBtn.classList.toggle('active', noteMode);
  }

  flashNumber(n, numPositions) {
    const positions = numPositions[n];
    if (!positions) return;
    for (const idx of positions) {
      const r = Math.floor(idx / 9);
      const c = idx % 9;
      this.cells[r][c].classList.add('flash-num');
    }
    setTimeout(() => {
      for (const idx of positions) {
        const r = Math.floor(idx / 9);
        const c = idx % 9;
        this.cells[r][c].classList.remove('flash-num');
      }
    }, 400);
  }

  celebrateLine(type, a, b) {
    const targets = [];
    for (let r = 0; r < 9; r++) {
      for (let c = 0; c < 9; c++) {
        let match = false;
        if (type === 'row' && r === a) match = true;
        if (type === 'col' && c === a) match = true;
        if (type === 'box' && Math.floor(r / 3) * 3 === a && Math.floor(c / 3) * 3 === b) match = true;
        if (match) targets.push([r, c]);
      }
    }

    setTimeout(() => {
      for (const [r, c] of targets) this.cells[r][c].classList.add('celebrate');
      setTimeout(() => {
        for (const [r, c] of targets) this.cells[r][c].classList.remove('celebrate');
      }, 700);
    }, 50);
  }

  updateRemain(state) {
    this.remainEl.textContent = state.remaining;
  }

  updateTimer(seconds) {
    const m = Math.floor(seconds / 60);
    const s = seconds % 60;
    this.timerEl.textContent = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
  }
}

// ============================================================
// 主游戏控制器
// ============================================================
class Game {
  constructor() {
    this.state = new GameState();
    this.renderer = new Renderer();
    this.selectedR = -1;
    this.selectedC = -1;
    this.seconds = 0;
    this.timerId = null;
    this.paused = false;
    this.highlightNum = 0;
    this.highlightTimer = null;
    this.longPressTimer = null;
    this.overlayActive = false;

    this.STORAGE_KEYS = {
      best: 'sudoku_best',
      save: 'sudoku_save',
      theme: 'sudoku_theme'
    };

    this.bindEvents();
    this.renderer.initGrid((r, c) => this.selectCell(r, c));
    this.renderer.renderColLabels();
    this.loadTheme();

    const saved = this.loadSave();
    if (saved && saved.solution) {
      this.restoreFromSave(saved);
      this.startTimer();
    } else {
      this.startNewGame();
    }
  }

  bindEvents() {
    document.getElementById('themeBtn').addEventListener('click', () => this.toggleTheme());
    document.getElementById('level').addEventListener('change', () => this.confirmNewGame());
    document.getElementById('autoCheck').addEventListener('change', (e) => {
      this.state.autoCheck = e.target.checked;
      this.render();
    });
    document.getElementById('modeBtn').addEventListener('click', () => this.toggleNoteMode());
    document.getElementById('undoBtn').addEventListener('click', () => this.undo());
    document.getElementById('eraseBtn').addEventListener('click', () => this.placeNumber(0));
    document.getElementById('autoNote').addEventListener('click', () => this.autoNotes());
    document.getElementById('hintBtn').addEventListener('click', () => this.useHint());
    document.getElementById('newGame').addEventListener('click', () => this.confirmNewGame());
    document.getElementById('pauseBtn').addEventListener('click', () => this.togglePause());

    this.renderer.numPad.addEventListener('click', (e) => {
      const card = e.target.closest('.num-card');
      if (!card || card.classList.contains('done')) return;
      this.placeNumber(parseInt(card.dataset.n));
    });

    this.renderer.numPad.addEventListener('pointerdown', (e) => {
      const card = e.target.closest('.num-card');
      if (!card || card.classList.contains('done')) return;
      const n = parseInt(card.dataset.n);
      this.longPressTimer = setTimeout(() => {
        this.toggleHighlight(n);
        this.longPressTimer = null;
      }, 400);
    });
    const cancelLongPress = () => {
      if (this.longPressTimer) { clearTimeout(this.longPressTimer); this.longPressTimer = null; }
    };
    this.renderer.numPad.addEventListener('pointerup', cancelLongPress);
    this.renderer.numPad.addEventListener('pointerleave', cancelLongPress);
    this.renderer.numPad.addEventListener('pointercancel', cancelLongPress);

    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => { this.applySize(); this.render(); }, 200);
    });

    document.addEventListener('keydown', (e) => {
      if (e.target.closest('select, input')) return;
      if (this.paused || this.overlayActive) return;

      const n = parseInt(e.key);
      if (n >= 1 && n <= 9) {
        this.placeNumber(n);
      } else if (e.key === 'Backspace' || e.key === 'Delete' || e.key === '0') {
        this.placeNumber(0);
      } else if (e.key === 'z' && (e.ctrlKey || e.metaKey)) {
        e.preventDefault(); this.undo();
      } else if (e.key === 'n' || e.key === 'N') {
        this.toggleNoteMode();
      } else if (e.key === 'ArrowUp' && this.selectedR > 0) {
        this.selectCell(this.selectedR - 1, this.selectedC);
      } else if (e.key === 'ArrowDown' && this.selectedR < 8) {
        this.selectCell(this.selectedR + 1, this.selectedC);
      } else if (e.key === 'ArrowLeft' && this.selectedC > 0) {
        this.selectCell(this.selectedR, this.selectedC - 1);
      } else if (e.key === 'ArrowRight' && this.selectedC < 8) {
        this.selectCell(this.selectedR, this.selectedC + 1);
      } else if (e.key === 'Escape') {
        this.togglePause();
      }
    });
  }

  render() {
    const lastPlaced = this.state.history.length > 0
      ? { r: this.state.history[this.state.history.length - 1].r, c: this.state.history[this.state.history.length - 1].c }
      : null;
    this.renderer.renderGrid(this.state, this.selectedR, this.selectedC, this.highlightNum, this.state.autoCheck, lastPlaced);
    this.renderer.updateNumPad(this.state);
    this.renderer.updateRemain(this.state);
    this.renderer.updateMenuState(this.state.history.length > 0, this.state.hintsLeft);
    this.renderer.errLabel.textContent = this.state.errors;
    this.renderer.hintLabel.textContent = this.state.hintsLeft + '次';
  }

  confirmNewGame() {
    if (!this.state.solution || this.state.remaining === 0) {
      this.startNewGame();
      return;
    }
    this.showOverlay('新游戏', '当前进度将丢失，确定开始新游戏吗？', [
      { text: '取消', cls: '', action: 'close' },
      { text: '确定', cls: 'primary', action: 'new' }
    ]);
  }

  showOverlay(title, message, buttons) {
    this.overlayActive = true;
    const overlay = document.createElement('div');
    overlay.className = 'overlay';
    const btnsHtml = buttons.map(b =>
      `<button class="btn ${b.cls}" data-action="${b.action}">${b.text}</button>`
    ).join('');
    overlay.innerHTML = `
      <div class="overlay-box">
        <h2>${title}</h2>
        <p>${message}</p>
        <div class="btn-row">${btnsHtml}</div>
      </div>
    `;
    document.body.appendChild(overlay);

    overlay.addEventListener('click', (e) => {
      const action = e.target.dataset?.action || (e.target === overlay ? 'close' : null);
      if (!action) return;
      overlay.remove();
      this.overlayActive = false;
      if (action === 'new') this.startNewGame();
    });
  }

  startNewGame() {
    this.stopTimer();
    this.paused = false;
    this.selectedR = -1;
    this.selectedC = -1;
    this.seconds = 0;
    this.highlightNum = 0;
    if (this.highlightTimer) { clearTimeout(this.highlightTimer); this.highlightTimer = null; }

    const level = document.getElementById('level').value;
    const { puzzle, solution, given } = SudokuEngine.generatePuzzle(level);
    this.state.initFromPuzzle(puzzle, solution, given, level);
    this.clearSave();

    this.renderer.updateTimer(0);
    this.renderer.hintLabel.textContent = '3次';
    this.renderer.errLabel.textContent = '0';
    this.renderer.updateModeBtn(false);
    this.renderer.updateMenuState(false, 3);
    this.renderer.renderNumPad(this.state);
    this.renderer.renderGrid(this.state, -1, -1, 0, this.state.autoCheck, null);
    this.renderer.renderBest(this.loadBest());
    this.renderer.pauseBtn.textContent = '⏯ 暂停';
  }

  restoreFromSave(save) {
    this.state.solution = save.solution;
    this.state.puzzle = save.puzzle.map(row => [...row]);
    this.state.given = save.given.map(row => [...row]);
    this.state.player = save.player.map(row => [...row]);
    this.state.notes = save.notes.map(row => row.map(s => new Set(s)));
    this.state.errors = save.errors || 0;
    this.state.hintsLeft = save.hintsLeft ?? 3;
    this.state.noteMode = save.noteMode || false;
    this.state.autoCheck = save.autoCheck ?? true;
    this.state.level = save.level || 'medium';
    this.state.history = save.history || [];
    this.state.dirtyCells = new Set();
    this.state.rebuildCounters();

    this.seconds = save.seconds || 0;
    document.getElementById('level').value = this.state.level;
    document.getElementById('autoCheck').checked = this.state.autoCheck;

    this.renderer.updateTimer(this.seconds);
    this.renderer.hintLabel.textContent = this.state.hintsLeft + '次';
    this.renderer.errLabel.textContent = this.state.errors;
    this.renderer.updateModeBtn(this.state.noteMode);
    this.renderer.renderNumPad(this.state);
    this.renderer.renderGrid(this.state, -1, -1, 0, this.state.autoCheck, null);
    this.renderer.renderBest(this.loadBest());
  }

  selectCell(r, c) {
    if (!this.timerId && !this.paused) this.startTimer();
    this.selectedR = r;
    this.selectedC = c;
    this.renderer.renderGrid(this.state, r, c, this.highlightNum, this.state.autoCheck, null);
  }

  placeNumber(n) {
    if (this.selectedR < 0 || this.selectedC < 0) return;
    if (this.state.given[this.selectedR][this.selectedC]) return;
    if (this.paused || this.overlayActive) return;
    if (!this.timerId) this.startTimer();

    const r = this.selectedR;
    const c = this.selectedC;
    this.state.placeNumber(r, c, n);

    this.renderer.updateNumPad(this.state);
    this.renderer.updateMenuState(this.state.history.length > 0, this.state.hintsLeft);
    this.renderer.errLabel.textContent = this.state.errors;
    this.renderer.renderGrid(this.state, this.selectedR, this.selectedC, this.highlightNum, this.state.autoCheck, { r, c });

    if (n > 0) {
      this.renderer.flashNumber(n, this.state.numPositions);
      this.checkLineCelebration(r, c);
    }

    this.renderer.updateRemain(this.state);
    this.saveGame();

    if (this.state.checkWin()) this.onWin();
  }

  checkLineCelebration(r, c) {
    const { player, solution } = this.state;
    if (SudokuEngine.isLineComplete(player, solution, 'row', r)) {
      this.renderer.celebrateLine('row', r);
    }
    if (SudokuEngine.isLineComplete(player, solution, 'col', c)) {
      this.renderer.celebrateLine('col', c);
    }
    const boxR = Math.floor(r / 3) * 3;
    const boxC = Math.floor(c / 3) * 3;
    if (SudokuEngine.isLineComplete(player, solution, 'box', boxR, boxC)) {
      this.renderer.celebrateLine('box', boxR, boxC);
    }
  }

  undo() {
    if (this.paused || this.overlayActive) return;
    const h = this.state.undo();
    if (!h) return;

    this.selectedR = h.r;
    this.selectedC = h.c;
    this.renderer.updateNumPad(this.state);
    this.renderer.updateMenuState(this.state.history.length > 0, this.state.hintsLeft);
    this.renderer.errLabel.textContent = this.state.errors;
    this.renderer.renderGrid(this.state, this.selectedR, this.selectedC, this.highlightNum, this.state.autoCheck, null);
    this.renderer.updateRemain(this.state);
    this.saveGame();
  }

  toggleNoteMode() {
    this.state.noteMode = !this.state.noteMode;
    this.renderer.updateModeBtn(this.state.noteMode);
  }

  autoNotes() {
    const filled = this.state.autoFillNotes();
    if (filled > 0) {
      this.renderer.renderGrid(this.state, this.selectedR, this.selectedC, this.highlightNum, this.state.autoCheck, null);
      this.saveGame();
    }
  }

  useHint() {
    if (this.paused || this.overlayActive) return;
    if (this.selectedR < 0 || this.selectedC < 0) return;
    if (this.state.given[this.selectedR][this.selectedC]) return;
    if (this.state.hintsLeft <= 0) return;
    if (this.state.player[this.selectedR][this.selectedC] === this.state.solution[this.selectedR][this.selectedC]) return;

    const r = this.selectedR;
    const c = this.selectedC;
    if (!this.state.useHint(r, c)) return;

    this.renderer.updateNumPad(this.state);
    this.renderer.updateMenuState(this.state.history.length > 0, this.state.hintsLeft);
    this.renderer.hintLabel.textContent = this.state.hintsLeft + '次';
    this.renderer.errLabel.textContent = this.state.errors;
    this.renderer.renderGrid(this.state, this.selectedR, this.selectedC, this.highlightNum, this.state.autoCheck, { r, c });

    this.renderer.flashNumber(this.state.solution[r][c], this.state.numPositions);
    this.checkLineCelebration(r, c);

    this.renderer.updateRemain(this.state);
    this.saveGame();

    if (this.state.checkWin()) this.onWin();
  }

  togglePause() {
    if (this.overlayActive) return;
    if (this.paused) {
      this.paused = false;
      this.renderer.pauseBtn.textContent = '⏯ 暂停';
      this.startTimer();
      this.renderer.renderGrid(this.state, this.selectedR, this.selectedC, this.highlightNum, this.state.autoCheck, null);
    } else {
      this.paused = true;
      this.stopTimer();
      this.renderer.pauseBtn.textContent = '▶ 继续';
    }
  }

  toggleHighlight(n) {
    if (this.highlightNum === n) {
      this.highlightNum = 0;
      if (this.highlightTimer) { clearTimeout(this.highlightTimer); this.highlightTimer = null; }
    } else {
      this.highlightNum = n;
      if (this.highlightTimer) clearTimeout(this.highlightTimer);
      this.highlightTimer = setTimeout(() => {
        this.highlightNum = 0;
        this.highlightTimer = null;
        this.renderer.renderGrid(this.state, this.selectedR, this.selectedC, 0, this.state.autoCheck, null);
      }, 3000);
    }
    this.renderer.renderGrid(this.state, this.selectedR, this.selectedC, this.highlightNum, this.state.autoCheck, null);
  }

  startTimer() {
    if (this.timerId) return;
    this.timerId = setInterval(() => {
      this.seconds++;
      this.renderer.updateTimer(this.seconds);
      if (this.seconds % 10 === 0) this.saveGame();
    }, 1000);
  }

  stopTimer() {
    if (this.timerId) { clearInterval(this.timerId); this.timerId = null; }
  }

  applySize() {
    const container = document.querySelector('.container');
    const cw = container.clientWidth - 24;
    let cell = Math.floor((cw - 24) / 9);
    if (cell < 28) cell = 28;
    if (cell > 48) cell = 48;
    const lw = Math.max(14, Math.round(cell * 0.5));
    const lh = Math.max(12, Math.round(cell * 0.42));

    const root = document.documentElement.style;
    root.setProperty('--cell', cell + 'px');
    root.setProperty('--lw', lw + 'px');
    root.setProperty('--lh', lh + 'px');
    root.setProperty('--fs', Math.round(cell * 0.42) + 'px');
    root.setProperty('--fsn', Math.max(6, Math.round(cell * 0.19)) + 'px');
    root.setProperty('--fsm', Math.max(10, Math.round(cell * 0.22)) + 'px');
    root.setProperty('--nb', Math.round(cell * 1.06) + 'px');
    root.setProperty('--nbs', Math.round(cell * 0.48) + 'px');
    root.setProperty('--nbc', Math.round(cell * 0.19) + 'px');
  }

  loadBest() {
    try { return JSON.parse(localStorage.getItem(this.STORAGE_KEYS.best)) || {}; }
    catch { return {}; }
  }

  saveBest(level, seconds) {
    const best = this.loadBest();
    if (!best[level] || seconds < best[level]) {
      best[level] = seconds;
      localStorage.setItem(this.STORAGE_KEYS.best, JSON.stringify(best));
    }
    this.renderer.renderBest(best);
  }

  saveGame() {
    const data = {
      solution: this.state.solution,
      puzzle: this.state.puzzle,
      given: this.state.given,
      player: this.state.player,
      notes: this.state.notes.map(row => row.map(s => [...s])),
      seconds: this.seconds,
      level: this.state.level,
      hintsLeft: this.state.hintsLeft,
      noteMode: this.state.noteMode,
      autoCheck: this.state.autoCheck,
      errors: this.state.errors,
      history: this.state.history
    };
    localStorage.setItem(this.STORAGE_KEYS.save, JSON.stringify(data));
  }

  loadSave() {
    try { return JSON.parse(localStorage.getItem(this.STORAGE_KEYS.save)); }
    catch { return null; }
  }

  clearSave() {
    localStorage.removeItem(this.STORAGE_KEYS.save);
  }

  loadTheme() {
    const theme = localStorage.getItem(this.STORAGE_KEYS.theme);
    if (theme === 'dark') {
      document.body.classList.add('dark');
      document.getElementById('themeBtn').textContent = '☀️';
    } else {
      document.getElementById('themeBtn').textContent = '🌙';
    }
  }

  toggleTheme() {
    const isDark = document.body.classList.toggle('dark');
    localStorage.setItem(this.STORAGE_KEYS.theme, isDark ? 'dark' : 'light');
    document.getElementById('themeBtn').textContent = isDark ? '☀️' : '🌙';
    this.renderer.renderColLabels();
    this.renderer.renderGrid(this.state, this.selectedR, this.selectedC, this.highlightNum, this.state.autoCheck, null);
  }

  onWin() {
    this.stopTimer();
    this.clearSave();
    this.saveBest(this.state.level, this.seconds);

    const m = Math.floor(this.seconds / 60);
    const s = this.seconds % 60;
    const timeStr = m > 0 ? `${m}分${s}秒` : `${s}秒`;
    const hintsUsed = 3 - this.state.hintsLeft;

    let stars = 1;
    if (this.state.level === 'hard') {
      if (this.seconds <= 300) stars = 3;
      else if (this.seconds <= 600) stars = 2;
    } else if (this.state.level === 'medium') {
      if (this.seconds <= 180) stars = 3;
      else if (this.seconds <= 420) stars = 2;
    } else {
      if (this.seconds <= 90) stars = 3;
      else if (this.seconds <= 240) stars = 2;
    }

    let info = timeStr;
    if (hintsUsed > 0) info += ' · ' + hintsUsed + '个提示';
    if (this.state.errors > 0) info += ' · ' + this.state.errors + '次错误';

    this.overlayActive = true;
    const overlay = document.createElement('div');
    overlay.className = 'overlay';
    overlay.innerHTML = `
      <div class="overlay-box">
        <div class="stars">${'⭐'.repeat(stars)}${'☆'.repeat(3 - stars)}</div>
        <h2>完成!</h2>
        <p>${info}</p>
        <button class="btn primary" id="winClose">再来一局</button>
      </div>
    `;
    document.body.appendChild(overlay);

    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) { overlay.remove(); this.overlayActive = false; this.startNewGame(); }
    });
    document.getElementById('winClose').addEventListener('click', () => {
      overlay.remove(); this.overlayActive = false; this.startNewGame();
    });

    this.spawnConfetti();
  }

  spawnConfetti() {
    const colors = ['#6366f1', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#14b8a6'];
    const container = document.createElement('div');
    container.className = 'confetti';
    container.style.cssText = 'left:0;top:0;width:100%;height:100%';

    for (let i = 0; i < 60; i++) {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      const size = Math.random() * 5 + 6;
      piece.style.cssText = `
        left: ${Math.random() * 100}%;
        top: -${Math.random() * 20 + 5}px;
        background: ${colors[Math.floor(Math.random() * colors.length)]};
        animation-duration: ${Math.random() * 1.2 + 1.5}s;
        animation-delay: ${Math.random() * 0.6}s;
        width: ${size}px; height: ${size}px;
      `;
      container.appendChild(piece);
    }

    document.body.appendChild(container);
    setTimeout(() => container.remove(), 2800);
  }
}

new Game();
</script>

</html>
