<h2>功能设计</h2>
<p class="subtitle">第二部分：游戏功能</p>

<div class="section">
  <h3>1. 提示功能</h3>
  <p>帮助玩家记忆卡牌位置</p>
  <div class="mockup">
    <div class="mockup-header">提示按钮设计</div>
    <div class="mockup-body">
      <div style="text-align:center;padding:20px">
        <div style="display:flex;gap:12px;justify-content:center;margin-bottom:15px">
          <button style="padding:8px 16px;background:linear-gradient(135deg,#fbbf24,#f59e0b);border:none;border-radius:8px;color:white;font-weight:600;font-size:13px">💡 提示 (3)</button>
          <button style="padding:8px 16px;background:rgba(255,255,255,0.7);border:1px solid #e2e8f0;border-radius:8px;color:#64748b;font-weight:600;font-size:13px">重新开始</button>
        </div>
        <p style="color:#64748b;font-size:13px">点击提示后，所有卡牌短暂翻开1秒，每局限3次</p>
      </div>
    </div>
  </div>
</div>

<div class="section">
  <h3>2. 排行榜系统</h3>
  <p>记录历史最佳成绩</p>
  <div class="mockup">
    <div class="mockup-header">排行榜界面</div>
    <div class="mockup-body">
      <div style="padding:20px">
        <div style="background:rgba(255,255,255,0.7);border-radius:12px;padding:15px;border:1px solid #e2e8f0">
          <div style="display:flex;justify-content:space-between;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid #e2e8f0">
            <span style="font-size:12px;font-weight:600;color:#94a3b8">难度</span>
            <span style="font-size:12px;font-weight:600;color:#94a3b8">步数</span>
            <span style="font-size:12px;font-weight:600;color:#94a3b8">用时</span>
          </div>
          <div style="display:flex;justify-content:space-between;margin-bottom:8px">
            <span style="font-size:13px;color:#1e293b">简单</span>
            <span style="font-size:13px;color:#10b981;font-weight:600">12步</span>
            <span style="font-size:13px;color:#1e293b">25秒</span>
          </div>
          <div style="display:flex;justify-content:space-between;margin-bottom:8px">
            <span style="font-size:13px;color:#1e293b">普通</span>
            <span style="font-size:13px;color:#10b981;font-weight:600">18步</span>
            <span style="font-size:13px;color:#1e293b">42秒</span>
          </div>
          <div style="display:flex;justify-content:space-between">
            <span style="font-size:13px;color:#1e293b">困难</span>
            <span style="font-size:13px;color:#94a3b8">--</span>
            <span style="font-size:13px;color:#94a3b8">--</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="section">
  <h3>3. 主题切换</h3>
  <p>多种卡牌主题可选</p>
  <div class="mockup">
    <div class="mockup-header">主题选择</div>
    <div class="mockup-body">
      <div style="padding:20px">
        <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
          <div style="padding:8px 16px;background:#818cf8;color:white;border-radius:8px;font-size:13px;font-weight:600">🍎 水果</div>
          <div style="padding:8px 16px;background:rgba(255,255,255,0.7);border:1px solid #e2e8f0;border-radius:8px;font-size:13px;color:#64748b">🐶 动物</div>
          <div style="padding:8px 16px;background:rgba(255,255,255,0.7);border:1px solid #e2e8f0;border-radius:8px;font-size:13px;color:#64748b">😀 表情</div>
          <div style="padding:8px 16px;background:rgba(255,255,255,0.7);border:1px solid #e2e8f0;border-radius:8px;font-size:13px;color:#64748b">⚽ 运动</div>
        </div>
        <p style="text-align:center;color:#64748b;font-size:13px;margin-top:15px">切换主题会重新开始游戏</p>
      </div>
    </div>
  </div>
</div>
