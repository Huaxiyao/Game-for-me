<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小游戏合集</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  min-height: 100vh;
  background: linear-gradient(145deg, #f0f4ff, #e8edf5);
  display: flex;
  justify-content: center;
  align-items: center;
}
.container { text-align: center; padding: 40px 24px; }
h1 { font-size: 28px; color: #1e293b; margin-bottom: 8px; }
p { color: #94a3b8; margin-bottom: 32px; }
.cards { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
.card {
  background: #fff;
  border-radius: 16px;
  padding: 32px 28px;
  width: 220px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.06);
  text-decoration: none;
  transition: all 0.2s;
  border: 1px solid rgba(255,255,255,0.8);
}
.card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,0.1); }
.card-icon { font-size: 36px; margin-bottom: 12px; }
.card h2 { font-size: 18px; color: #1e293b; margin-bottom: 6px; }
.card .desc { font-size: 13px; color: #94a3b8; }
@media (max-width: 520px) {
  .container { padding: 24px 16px; }
  h1 { font-size: 24px; }
  p { margin-bottom: 24px; }
  .cards { gap: 14px; }
  .card { width: 100%; max-width: 300px; padding: 24px 20px; }
  .card-icon { font-size: 28px; margin-bottom: 8px; }
  .card h2 { font-size: 16px; }
}
</style>
</head>
<body>
<div class="container">
  <h1>小游戏合集</h1>
  <p>选择下面一个工具开始</p>
  <div class="cards">
    <a class="card" href="schulte-grid.html">
      <div class="card-icon">🔢</div>
      <h2>舒尔特方格</h2>
      <div class="desc">经典版 · 数字点击训练</div>
    </a>
    <a class="card" href="schulte-pro.html">
      <div class="card-icon">🧠</div>
      <h2>舒尔特方格 Pro</h2>
      <div class="desc">进阶版 · 多尺寸/数据图表</div>
    </a>
    <a class="card" href="reaction-test.html">
      <div class="card-icon">⚡</div>
      <h2>反应速度测试</h2>
      <div class="desc">视觉反应 · 红绿变化计时</div>
    </a>
    <a class="card" href="gomoku.html">
      <div class="card-icon">⚫</div>
      <h2>五子棋</h2>
      <div class="desc">双人对战 · 棋盘博弈</div>
    </a>
    <a class="card" href="cps-test.html">
      <div class="card-icon">🖱️</div>
      <h2>手速测试</h2>
      <div class="desc">10秒 · 测你点得多快</div>
    </a>
  </div>
</div>
</body>
</html>
