<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>数独</title>
<style>
:root{
  --bg:#f0f4ff;--bg2:#e8edf5;--surface:#fff;
  --text:#1e293b;--text2:#94a3b8;
  --pri:#6366f1;--pri-light:#eef2ff;--pri-dark:#4f46e5;
  --red:#ef4444;--red-bg:#fef2f2;--green:#10b981;--green-bg:#d1fae5;
  --border:#e2e8f0;--box-border:#94a3b8;
  --shadow:0 8px 30px rgba(0,0,0,.06);
  --cell:48px;--lw:24px;--lh:20px;--gap:5px;
}
.dark{
  --bg:#0f172a;--bg2:#1e293b;--surface:#1e293b;
  --text:#e2e8f0;--text2:#64748b;
  --pri:#818cf8;--pri-light:#1e1b4b;--pri-dark:#6366f1;
  --red:#f87171;--red-bg:#450a0a;--green:#34d399;--green-bg:#064e3b;
  --border:#334155;--box-border:#475569;
  --shadow:0 8px 30px rgba(0,0,0,.3);
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  min-height:100vh;min-height:100dvh;
  background:linear-gradient(155deg,var(--bg),var(--bg2));
  display:flex;justify-content:center;align-items:flex-start;
  user-select:none;-webkit-user-select:none;
  padding:8px 0 20px;overflow-y:auto;
}
.container{max-width:520px;width:100%;padding:12px 12px 10px}

.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px}
.top-bar h1{font-size:20px;font-weight:700;color:var(--text)}
.top-right{display:flex;align-items:center;gap:8px}
.top-right select{
  padding:3px 10px;border:1.5px solid var(--border);border-radius:8px;
  font-size:12px;font-weight:600;background:var(--surface);color:var(--text);
  outline:none;cursor:pointer;
}
.top-right select:focus{border-color:var(--pri)}
.theme-btn{
  width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border);
  background:var(--surface);font-size:14px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .2s;
}
.theme-btn:hover{background:var(--pri-light);border-color:var(--pri)}

.info-row{display:flex;justify-content:center;gap:10px;margin-bottom:6px;flex-wrap:wrap;align-items:center}
.info-item{font-size:11px;color:var(--text2);display:flex;align-items:center;gap:3px}
.info-item b{color:var(--text);font-weight:600}
.info-item input{width:13px;height:13px;accent-color:var(--pri)}

.grid-wrap{display:flex;flex-direction:column;align-items:center}
.col-labels{display:flex;padding-left:var(--lw)}
.col-labels span{
  width:var(--cell);height:var(--lh);display:flex;
  align-items:center;justify-content:center;
  font-size:var(--fsm);font-weight:600;color:var(--text2);
}
.grid-row{display:flex;align-items:stretch}
.row-label{
  width:var(--lw);display:flex;align-items:center;justify-content:center;
  font-size:var(--fsm);font-weight:600;color:var(--text2);
}
.grid{
  display:grid;grid-template-columns:repeat(9,var(--cell));
  grid-template-rows:repeat(9,var(--cell));gap:0;
  border:3px solid var(--box-border);border-radius:6px;
  box-shadow:var(--shadow);overflow:hidden;
}
.cell{
  display:flex;align-items:center;justify-content:center;
  font-size:var(--fs);font-weight:600;cursor:pointer;
  color:var(--text);transition:background .06s;
  position:relative;border:0.5px solid #cbd5e1;
  background:var(--surface);width:var(--cell);height:var(--cell);
}
.dark .cell{border-color:#334455}
.cell:hover{background:#f1f5f9}
.cell.given{color:var(--pri);font-weight:700;cursor:default}
.cell.given:hover{background:var(--pri-light)}
.cell.selected{box-shadow:inset 0 0 0 3px var(--pri)!important;z-index:2}
.cell.hl-num{background:#dbeafe}
.dark .cell.hl-num{background:#1e3a5f}
.cell.hl-rel{background:#eef2ff}
.dark .cell.hl-rel{background:#162032}
.cell.conflict{background:var(--red-bg)!important;color:var(--red)!important}
.cell.conflict.given{color:var(--red)!important}
.cell.br{border-right:3px solid var(--box-border)!important}
.cell.bb{border-bottom:3px solid var(--box-border)!important}
.cell.pop{animation:popIn .25s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes popIn{0%{transform:scale(.4);opacity:0}60%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}
.cell.flash-num{animation:flashNum .4s ease}
@keyframes flashNum{0%{background:#bfdbfe}100%{}}
.cell.celebrate{animation:celebrate .6s ease}
@keyframes celebrate{0%{background:var(--green-bg)}50%{background:#a7f3d0}100%{}}
.cell .notes{
  display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);
  position:absolute;inset:1px;
}
.cell .notes span{
  font-size:var(--fsn);font-weight:500;color:var(--text2);
  display:flex;align-items:center;justify-content:center;line-height:1;
}

.menu-row{display:flex;gap:5px;justify-content:center;margin-top:10px;flex-wrap:nowrap}
.menu-btn{
  flex:1;padding:8px 6px;border-radius:20px;border:1.5px solid var(--border);
  background:var(--surface);color:var(--text2);font-size:var(--fsm);font-weight:600;
  cursor:pointer;transition:all .15s;white-space:nowrap;text-align:center;
}
.menu-btn:hover{transform:translateY(-1px);box-shadow:0 3px 10px rgba(0,0,0,.06);border-color:var(--pri)}
.menu-btn:active{transform:scale(.96)}
.menu-btn.active{background:var(--pri);color:#fff;border-color:var(--pri)}
.menu-btn.undo{color:#ef4444;border-color:#fecaca}
.menu-btn.undo:hover{background:var(--red-bg);border-color:#ef4444}
.menu-btn.erase{color:#ef4444;border-color:#fecaca}
.menu-btn.erase:hover{background:var(--red-bg);border-color:#ef4444}
.menu-btn.hint{color:#10b981;border-color:#a7f3d0}
.menu-btn.hint:hover{background:var(--green-bg);border-color:#10b981}
.menu-btn.disabled{opacity:.35;cursor:default;pointer-events:none}

.num-pad{display:flex;gap:5px;justify-content:center;margin-top:10px}
.num-card{
  flex:1;max-width:var(--nb);min-width:30px;border-radius:12px;
  border:2px solid var(--border);background:var(--surface);cursor:pointer;
  transition:all .15s;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:6px 2px 4px;gap:0;
}
.num-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.08);border-color:var(--pri)}
.num-card:active{transform:scale(.93)}
.num-card .num-big{font-size:var(--nbs);font-weight:700;color:var(--text);line-height:1}
.num-card .num-cnt{font-size:var(--nbc);font-weight:600;color:var(--text2);line-height:1}
.num-card.done{border-color:#a7f3d0;background:var(--green-bg);cursor:default;pointer-events:none}
.num-card.done .num-big{color:var(--green)}
.num-card.done .num-cnt{color:var(--green)}

.best-bar{display:flex;justify-content:center;gap:5px;margin-top:8px;flex-wrap:wrap}
.best-item{font-size:10px;color:var(--text2);background:var(--surface);padding:2px 10px;border-radius:8px;border:1px solid var(--border)}
.best-item b{color:var(--pri);font-weight:600}
.btn-row{display:flex;gap:8px;justify-content:center;margin-top:8px}
.btn{
  padding:7px 20px;border-radius:12px;font-size:13px;font-weight:600;
  cursor:pointer;transition:all .2s;color:var(--text2);
  background:var(--surface);border:1px solid var(--border);
}
.btn:hover{background:var(--pri-light);color:var(--pri)}
.btn.primary{background:var(--pri);color:#fff;border-color:var(--pri)}
.btn.primary:hover{background:var(--pri-dark)}

.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.55);
  display:flex;align-items:center;justify-content:center;
  z-index:100;animation:fadeIn .3s forwards;
}
@keyframes fadeIn{to{opacity:1}}
.overlay-box{
  background:var(--surface);border-radius:24px;padding:32px 36px;
  text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2);
  animation:slideUp .5s cubic-bezier(0.34,1.56,0.64,1);
  max-width:320px;width:90%;
}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.overlay-box .stars{font-size:28px;margin-bottom:2px;letter-spacing:4px}
.overlay-box h2{font-size:26px;color:var(--text);margin-bottom:2px}
.overlay-box p{font-size:14px;color:var(--text2);margin-bottom:16px;line-height:1.6}
.overlay-box .btn{padding:10px 36px;font-size:15px}

.confetti{position:fixed;pointer-events:none;z-index:200}
.confetti-piece{
  position:absolute;width:8px;height:8px;border-radius:2px;
  animation:confettiFall 2s ease-out forwards;
}
@keyframes confettiFall{
  0%{transform:translateY(0) rotate(0deg) scale(1);opacity:1}
  100%{transform:translateY(100vh) rotate(720deg) scale(0);opacity:0}
}

@media(max-width:520px){
  .container{padding:6px 4px 8px}
  .info-row{gap:6px}
  .info-item{font-size:10px}
}
</style>
</head>
<body>
<div class="container">
  <div class="top-bar">
    <h1>数独</h1>
    <div class="top-right">
      <select id="level">
        <option value="easy">简单</option>
        <option value="medium" selected>中等</option>
        <option value="hard">困难</option>
      </select>
      <button class="theme-btn" id="themeBtn">🌙</button>
    </div>
  </div>

  <div class="info-row">
    <span class="info-item">⏱ <b id="timer">00:00</b></span>
    <span class="info-item">剩余 <b id="remain">0</b></span>
    <span class="info-item">错误 <b id="errLabel">0</b></span>
    <span class="info-item">提示 <b id="hintLabel">3次</b></span>
    <label class="info-item" style="cursor:pointer">
      <input type="checkbox" id="autoCheck" checked>实时检查
    </label>
  </div>

  <div class="grid-wrap">
    <div class="col-labels" id="colLabels"></div>
    <div id="gridContainer"></div>
  </div>

  <div class="menu-row">
    <button class="menu-btn undo" id="undoBtn">撤销</button>
    <button class="menu-btn erase" id="eraseBtn">擦除</button>
    <button class="menu-btn active" id="modeBtn">备注</button>
    <button class="menu-btn" id="autoNote">一键备注</button>
    <button class="menu-btn hint" id="hintBtn">智能提示</button>
  </div>

  <div class="num-pad" id="numPad"></div>

  <div class="best-bar" id="bestBar"></div>
  <div class="btn-row">
    <button class="btn" id="pauseBtn">⏯ 暂停</button>
    <button class="btn primary" id="newGame">新游戏</button>
  </div>
</div>

<script>
const BEST_KEY='sudoku_best_v7',SAVE_KEY='sudoku_save_v7',THEME_KEY='sudoku_theme';
const DIFF={easy:38,medium:46,hard:54};
const DNAMES={easy:'简单',medium:'中等',hard:'困难'};

let solution,given,player,notes,history;
let selR=-1,selC=-1,noteMode=false,autoCheck=true;
let seconds=0,timerId=null,hintsLeft=3,paused=false;
let errors=0,lastPlacedR=-1,lastPlacedC=-1;
let highlightNum=0,highlightTimer=null;

const $=id=>document.getElementById(id);
const timerEl=$('timer'),remainEl=$('remain'),hintLabel=$('hintLabel'),errLabel=$('errLabel');
const levelSel=$('level'),autoCheckEl=$('autoCheck');
const modeBtn=$('modeBtn'),undoBtn=$('undoBtn'),hintBtn=$('hintBtn');
const numPad=$('numPad'),bestBar=$('bestBar');
const newBtn=$('newGame'),autoNoteBtn=$('autoNote'),eraseBtn=$('eraseBtn');
const themeBtn=$('themeBtn'),pauseBtn=$('pauseBtn');
const gridCt=$('gridContainer'),colLabels=$('colLabels');

function shuf(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

function isValid(board,r,c,n){
  for(let i=0;i<9;i++)if(board[r][i]===n||board[i][c]===n)return false;
  const br=Math.floor(r/3)*3,bc=Math.floor(c/3)*3;
  for(let i=0;i<3;i++)for(let j=0;j<3;j++)if(board[br+i][bc+j]===n)return false;
  return true;
}

function getCands(board,r,c){
  if(board[r][c]!==0)return[];
  const used=new Set();
  for(let i=0;i<9;i++){if(board[r][i])used.add(board[r][i]);if(board[i][c])used.add(board[i][c])}
  const br=Math.floor(r/3)*3,bc=Math.floor(c/3)*3;
  for(let i=0;i<3;i++)for(let j=0;j<3;j++){const v=board[br+i][bc+j];if(v)used.add(v)}
  const res=[];for(let n=1;n<=9;n++)if(!used.has(n))res.push(n);return res;
}

function solve(board){
  for(let r=0;r<9;r++)for(let c=0;c<9;c++){
    if(board[r][c]===0){
      for(const n of shuf([1,2,3,4,5,6,7,8,9])){if(isValid(board,r,c,n)){board[r][c]=n;if(solve(board))return true;board[r][c]=0}}
      return false;
    }
  }
  return true;
}

function countSol(board,limit){
  let c=0;
  function dfs(){
    if(c>=limit)return;
    let br=-1,bc=-1,ca=null,bl=10;
    for(let r=0;r<9;r++)for(let co=0;co<9;co++){if(board[r][co]===0){const cn=getCands(board,r,co);if(!cn.length)return;if(cn.length<bl){bl=cn.length;br=r;bc=co;ca=cn}}}
    if(br===-1){c++;return}
    for(const n of ca){board[br][bc]=n;dfs();board[br][bc]=0;if(c>=limit)return}
  }
  dfs();return c;
}

function generate(level){
  const board=Array.from({length:9},()=>Array(9).fill(0));solve(board);
  solution=board.map(r=>[...r]);
  const target=DIFF[level]||46;
  const pos=shuf(Array.from({length:81},(_,i)=>({r:Math.floor(i/9),c:i%9})));
  given=Array.from({length:9},()=>Array(9).fill(true));let rem=0;
  for(const p of pos){
    if(rem>=target)break;
    const bk=board[p.r][p.c];board[p.r][p.c]=0;
    const t=board.map(r=>[...r]);
    if(countSol(t,2)===1){rem++;given[p.r][p.c]=false}else board[p.r][p.c]=bk;
  }
  player=board.map(r=>[...r]);
  notes=Array.from({length:9},()=>Array.from({length:9},()=>new Set()));
  history=[];
}

function loadBest(){try{return JSON.parse(localStorage.getItem(BEST_KEY))||{}}catch{return{}}}
function saveBest(lv,sec){
  const b=loadBest();
  if(!b[lv]||sec<b[lv]){b[lv]=sec;localStorage.setItem(BEST_KEY,JSON.stringify(b))}
  renderBest();
}
function renderBest(){
  const b=loadBest();const e=Object.entries(b).filter(([,t])=>t!==undefined);
  bestBar.innerHTML=e.length?e.map(([l,t])=>{const m=Math.floor(t/60),s=t%60;return'<span class="best-item">'+DNAMES[l]+'最佳 <b>'+m+':'+String(s).padStart(2,'0')+'</b></span>'}).join(''):'';
}
function saveGame(){
  localStorage.setItem(SAVE_KEY,JSON.stringify({solution,given,player,notes:notes.map(r=>r.map(s=>[...s])),seconds,level:levelSel.value,hintsLeft,noteMode,autoCheck,errors}));
}
function loadGame(){try{return JSON.parse(localStorage.getItem(SAVE_KEY))}catch{return null}}
function clearSave(){localStorage.removeItem(SAVE_KEY)}

function startTimer(){if(timerId||paused)return;timerId=setInterval(()=>{seconds++;const m=Math.floor(seconds/60),s=seconds%60;timerEl.textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');if(seconds%5===0)saveGame()},1000)}
function stopTimer(){clearInterval(timerId);timerId=null}

function updateRemain(){let r=0;for(let i=0;i<9;i++)for(let j=0;j<9;j++)if(player[i][j]===0)r++;remainEl.textContent=r}

function updateMenuState(){
  undoBtn.classList.toggle('disabled',!history.length);
  hintBtn.classList.toggle('disabled',hintsLeft<=0);
}

function buildNumPad(){
  numPad.innerHTML='';
  const cnt=Array(10).fill(0);
  for(let r=0;r<9;r++)for(let c=0;c<9;c++)if(player[r][c])cnt[player[r][c]]++;
  for(let n=1;n<=9;n++){
    const card=document.createElement('button');card.className='num-card';
    const left=9-cnt[n];
    card.innerHTML='<span class="num-big">'+n+'</span><span class="num-cnt">'+(left<=0?'✓':left)+'</span>';
    card.dataset.n=n;
    if(left<=0)card.classList.add('done');
    let lpTimer;
    card.addEventListener('pointerdown',()=>{
      lpTimer=setTimeout(()=>{highlightNumToggle(n);lpTimer=null},400);
    });
    const cancelLp=()=>{if(lpTimer){clearTimeout(lpTimer);lpTimer=null}};
    card.addEventListener('pointerup',cancelLp);
    card.addEventListener('pointerleave',cancelLp);
    card.addEventListener('pointercancel',cancelLp);
    card.addEventListener('click',()=>{if(lpTimer!==null)placeNum(n)});
    numPad.appendChild(card);
  }
}

function highlightNumToggle(n){
  if(highlightNum===n){highlightNum=0;clearTimeout(highlightTimer);highlightTimer=null}
  else{highlightNum=n;clearTimeout(highlightTimer);highlightTimer=setTimeout(()=>{highlightNum=0;highlightTimer=null;renderGrid()},3000)}
  renderGrid();
}

function getConflicts(r,c,n){
  if(n===0)return[];
  const res=[];
  for(let i=0;i<9;i++){if(i!==c&&player[r][i]===n)res.push([r,i]);if(i!==r&&player[i][c]===n)res.push([i,c])}
  const br=Math.floor(r/3)*3,bc=Math.floor(c/3)*3;
  for(let i=0;i<3;i++)for(let j=0;j<3;j++){const nr=br+i,nc=bc+j;if((nr!==r||nc!==c)&&player[nr][nc]===n)res.push([nr,nc])}
  return res;
}

function getSurrounding(r,c){
  const adj=[];
  for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
    if(dr===0&&dc===0)continue;
    const nr=r+dr,nc=c+dc;if(nr>=0&&nr<9&&nc>=0&&nc<9)adj.push([nr,nc]);
  }
  return adj;
}

function renderGrid(){
  gridCt.innerHTML='';
  const activeNum=highlightNum||(selR>=0?player[selR][selC]:0);
  const conflictSet=new Set();
  if(autoCheck&&selR>=0&&activeNum>0){
    getConflicts(selR,selC,activeNum).forEach(([r,c])=>conflictSet.add(r*9+c));
    conflictSet.add(selR*9+selC);
  }
  const numSet=new Set();const relSet=new Set();
  if(activeNum>0){
    for(let r=0;r<9;r++)for(let c=0;c<9;c++)if(player[r][c]===activeNum)numSet.add(r*9+c);
    if(selR>=0){
      getSurrounding(selR,selC).forEach(([r,c])=>{if(player[r][c]===0)relSet.add(r*9+c)});
      for(let i=0;i<9;i++){if(!numSet.has(selR*9+i))relSet.add(selR*9+i)}
      for(let i=0;i<9;i++){if(!numSet.has(i*9+selC))relSet.add(i*9+selC)}
    }
  }

  for(let r=0;r<9;r++){
    const row=document.createElement('div');row.className='grid-row';
    const rl=document.createElement('div');rl.className='row-label';
    rl.textContent=String.fromCharCode(65+r);row.appendChild(rl);
    for(let c=0;c<9;c++){
      const el=document.createElement('div');el.className='cell';
      if(c%3===2&&c<8)el.classList.add('br');
      if(r%3===2&&r<8)el.classList.add('bb');
      if(given[r][c])el.classList.add('given');else el.classList.add('user');
      if(r===selR&&c===selC)el.classList.add('selected');
      else if(numSet.has(r*9+c))el.classList.add('hl-num');
      else if(relSet.has(r*9+c))el.classList.add('hl-rel');
      if(autoCheck&&conflictSet.has(r*9+c))el.classList.add('conflict');
      if(r===lastPlacedR&&c===lastPlacedC)el.classList.add('pop');
      if(paused){row.appendChild(el);continue}
      if(player[r][c]!==0)el.textContent=player[r][c];
      else if(notes[r][c].size>0){
        const nd=document.createElement('div');nd.className='notes';
        for(let n=1;n<=9;n++){const sp=document.createElement('span');sp.textContent=notes[r][c].has(n)?n:'';nd.appendChild(sp)}
        el.appendChild(nd);
      }
      el.addEventListener('click',()=>selectCell(r,c));
      row.appendChild(el);
    }
    gridCt.appendChild(row);
  }
  lastPlacedR=-1;lastPlacedC=-1;
}

function buildColLabels(){
  colLabels.innerHTML='';
  for(let c=1;c<=9;c++){const s=document.createElement('span');s.textContent=c;colLabels.appendChild(s)}
}

function applySize(){
  const cw=document.querySelector('.container').clientWidth-24;
  let cell=Math.floor((cw-24)/9);
  if(cell<28)cell=28;if(cell>48)cell=48;
  let lw=Math.round(cell*.5),lh=Math.round(cell*.42);
  if(lw<14)lw=14;if(lh<12)lh=12;
  const root=document.documentElement.style;
  root.setProperty('--cell',cell+'px');
  root.setProperty('--lw',lw+'px');
  root.setProperty('--lh',lh+'px');
  root.setProperty('--fs',Math.round(cell*.42)+'px');
  root.setProperty('--fsn',Math.max(6,Math.round(cell*.19))+'px');
  root.setProperty('--fsm',Math.max(10,Math.round(cell*.22))+'px');
  root.setProperty('--nb',Math.round(cell*1.06)+'px');
  root.setProperty('--nbs',Math.round(cell*.48)+'px');
  root.setProperty('--nbc',Math.round(cell*.19)+'px');
}

function selectCell(r,c){if(!timerId&&!paused)startTimer();selR=r;selC=c;renderGrid()}

function clearNotesFor(n,r,c){
  for(let i=0;i<9;i++){notes[r][i].delete(n);notes[i][c].delete(n)}
  const br=Math.floor(r/3)*3,bc=Math.floor(c/3)*3;
  for(let i=0;i<3;i++)for(let j=0;j<3;j++)notes[br+i][bc+j].delete(n);
}

function flashNumOnGrid(n){
  const rows=gridCt.children;
  for(let r=0;r<9;r++){
    const cells=rows[r].children;
    for(let c=1;c<=9;c++){
      if(player[r][c-1]===n)cells[c].classList.add('flash-num');
    }
  }
  setTimeout(()=>{
    for(let r=0;r<9;r++){
      const cells=rows[r].children;
      for(let c=1;c<=9;c++)cells[c].classList.remove('flash-num');
    }
  },400);
}

function isLineComplete(type,a,b){
  if(type==='row'){for(let i=0;i<9;i++)if(player[a][i]!==solution[a][i])return false;return true}
  if(type==='col'){for(let i=0;i<9;i++)if(player[i][a]!==solution[i][a])return false;return true}
  for(let i=0;i<3;i++)for(let j=0;j<3;j++){const nr=a+i,nc=b+j;if(player[nr][nc]!==solution[nr][nc])return false}
  return true;
}

function celebrateLine(type,a,b){
  setTimeout(()=>{
    const rows=gridCt.children;
    for(let r=0;r<9;r++){
      const cells=rows[r].children;
      for(let c=0;c<9;c++){
        let match=false;
        if(type==='row'&&r===a)match=true;
        if(type==='col'&&c===a)match=true;
        if(type==='box'&&Math.floor(r/3)*3===a&&Math.floor(c/3)*3===b)match=true;
        if(match)cells[c+1].classList.add('celebrate');
      }
    }
    setTimeout(()=>{for(const row of gridCt.children)for(const cell of row.children)cell.classList.remove('celebrate')},700);
  },50);
}

function placeNum(n){
  if(selR<0||selC<0||given[selR][selC]||paused)return;
  if(!timerId)startTimer();
  const r=selR,c=selC;
  if(noteMode&&n>0){
    history.push({type:'note',r,c,val:n,prev:new Set(notes[r][c])});
    if(notes[r][c].has(n))notes[r][c].delete(n);else notes[r][c].add(n);
    player[r][c]=0;
  }else{
    history.push({type:'place',r,c,prev:player[r][c],prevNotes:new Set(notes[r][c])});
    player[r][c]=n;notes[r][c]=new Set();
    if(n>0){
      clearNotesFor(n,r,c);
      lastPlacedR=r;lastPlacedC=c;
      if(player[r][c]!==solution[r][c]){errors++;errLabel.textContent=errors}
      flashNumOnGrid(n);
      if(isLineComplete('row',r))celebrateLine('row',r);
      if(isLineComplete('col',c))celebrateLine('col',c);
      const br=Math.floor(r/3)*3,bc=Math.floor(c/3)*3;
      if(isLineComplete('box',br,bc))celebrateLine('box',br,bc);
    }
  }
  buildNumPad();updateRemain();updateMenuState();renderGrid();saveGame();
  if(checkWin())onWin();
}

function undo(){
  if(!history.length||paused)return;
  const h=history.pop();
  if(h.type==='note')notes[h.r][h.c]=h.prev;
  else{player[h.r][h.c]=h.prev;notes[h.r][h.c]=h.prevNotes}
  selR=h.r;selC=h.c;
  buildNumPad();updateRemain();updateMenuState();renderGrid();saveGame();
}

function autoNotes(){
  let f=0;
  for(let r=0;r<9;r++)for(let c=0;c<9;c++){if(player[r][c]===0&&notes[r][c].size===0){const cn=getCands(player,r,c);if(cn.length===1){notes[r][c].add(cn[0]);f++}else if(cn.length>0&&cn.length<=3){cn.forEach(n=>notes[r][c].add(n));f++}}}
  if(f>0){renderGrid();saveGame()}
}

function useHint(){
  if(hintsLeft<=0||paused)return;
  if(selR<0||selC<0||given[selR][selC])return;
  if(player[selR][selC]===solution[selR][selC])return;
  history.push({type:'place',r:selR,c:selC,prev:player[selR][selC],prevNotes:new Set(notes[selR][selC])});
  player[selR][selC]=solution[selR][selC];notes[selR][selC]=new Set();
  clearNotesFor(solution[selR][selC],selR,selC);
  lastPlacedR=selR;lastPlacedC=selC;
  hintsLeft--;hintLabel.textContent=hintsLeft+'次';
  flashNumOnGrid(solution[selR][selC]);
  if(isLineComplete('row',selR))celebrateLine('row',selR);
  if(isLineComplete('col',selC))celebrateLine('col',selC);
  const br=Math.floor(selR/3)*3,bc=Math.floor(selC/3)*3;
  if(isLineComplete('box',br,bc))celebrateLine('box',br,bc);
  buildNumPad();updateRemain();updateMenuState();renderGrid();saveGame();
  if(checkWin())onWin();
}

function checkWin(){
  for(let r=0;r<9;r++)for(let c=0;c<9;c++)if(player[r][c]!==solution[r][c])return false;
  return true;
}

function onWin(){
  stopTimer();clearSave();saveBest(levelSel.value,seconds);
  const m=Math.floor(seconds/60),s=seconds%60,t=m>0?m+'分'+s+'秒':s+'秒';
  const used=3-hintsLeft;
  const sc=levelSel.value==='hard'?(seconds<=300?3:seconds<=600?2:1):(levelSel.value==='medium'?(seconds<=180?3:seconds<=420?2:1):(seconds<=90?3:seconds<=240?2:1));
  let info=t;
  if(used>0)info+=' · '+used+'个提示';
  if(errors>0)info+=' · '+errors+'次错误';
  const overlay=document.createElement('div');overlay.className='overlay';
  overlay.innerHTML='<div class="overlay-box"><div class="stars">'+'⭐'.repeat(sc)+'☆'.repeat(3-sc)+'</div><h2>完成!</h2><p>'+info+'</p><button class="btn primary" id="winClose">再来一局</button></div>';
  document.body.appendChild(overlay);
  overlay.addEventListener('click',e=>{if(e.target===overlay){overlay.remove();init(false)}});
  document.getElementById('winClose').addEventListener('click',()=>{overlay.remove();init(false)});
  spawnConfetti();
}

function spawnConfetti(){
  const colors=['#6366f1','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899','#14b8a6'];
  const ct=document.createElement('div');ct.className='confetti';
  ct.style.cssText='left:0;top:0;width:100%;height:100%';
  for(let i=0;i<60;i++){
    const p=document.createElement('div');p.className='confetti-piece';
    p.style.cssText='left:'+Math.random()*100+'%;top:-'+(Math.random()*20+5)+'px;background:'+colors[Math.floor(Math.random()*colors.length)]+';animation-duration:'+(Math.random()*1.2+1.5)+'s;animation-delay:'+Math.random()*.6+'s;width:'+(Math.random()*5+6)+'px;height:'+(Math.random()*5+6)+'px';
    ct.appendChild(p);
  }
  document.body.appendChild(ct);setTimeout(()=>ct.remove(),2800);
}

function togglePause(){
  if(paused){paused=false;pauseBtn.textContent='⏯ 暂停';if(timerId)startTimer();renderGrid()}
  else{paused=true;stopTimer();pauseBtn.textContent='▶ 继续';renderGrid()}
}

function init(resume){
  stopTimer();paused=false;pauseBtn.textContent='⏯ 暂停';
  selR=-1;selC=-1;noteMode=false;errors=0;
  lastPlacedR=-1;lastPlacedC=-1;highlightNum=0;
  modeBtn.textContent='备注';modeBtn.classList.remove('active');
  autoCheck=autoCheckEl.checked;
  applySize();
  buildColLabels();
  if(!resume){seconds=0;timerEl.textContent='00:00';hintsLeft=3;generate(levelSel.value);clearSave()}
  else startTimer();
  hintLabel.textContent=hintsLeft+'次';errLabel.textContent=errors;
  updateRemain();buildNumPad();updateMenuState();renderGrid();renderBest();
}

function initFromSave(sv){
  solution=sv.solution;given=sv.given;player=sv.player;
  notes=sv.notes.map(r=>r.map(a=>new Set(a)));
  seconds=sv.seconds||0;hintsLeft=sv.hintsLeft??3;
  noteMode=sv.noteMode||false;autoCheck=sv.autoCheck??true;errors=sv.errors||0;
  const m=Math.floor(seconds/60),s=seconds%60;timerEl.textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  hintLabel.textContent=hintsLeft+'次';errLabel.textContent=errors;
  autoCheckEl.checked=autoCheck;levelSel.value=sv.level||'medium';
  modeBtn.textContent=noteMode?'填入':'备注';
  if(noteMode)modeBtn.classList.add('active');else modeBtn.classList.remove('active');
}

function loadTheme(){
  const t=localStorage.getItem(THEME_KEY);
  if(t==='dark'){document.body.classList.add('dark');themeBtn.textContent='☀️'}
  else themeBtn.textContent='🌙';
}
function toggleTheme(){
  const isDark=document.body.classList.toggle('dark');
  localStorage.setItem(THEME_KEY,isDark?'dark':'light');
  themeBtn.textContent=isDark?'☀️':'🌙';
  buildColLabels();renderGrid();
}

loadTheme();
themeBtn.addEventListener('click',toggleTheme);
levelSel.addEventListener('change',()=>init(false));
autoCheckEl.addEventListener('change',()=>{autoCheck=autoCheckEl.checked;renderGrid()});
let resizeDebounce;
window.addEventListener('resize',()=>{clearTimeout(resizeDebounce);resizeDebounce=setTimeout(()=>{applySize();buildColLabels();renderGrid()},200)});
modeBtn.addEventListener('click',()=>{
  noteMode=!noteMode;
  if(noteMode){modeBtn.textContent='填入';modeBtn.classList.add('active')}
  else{modeBtn.textContent='备注';modeBtn.classList.remove('active')}
});
undoBtn.addEventListener('click',undo);
eraseBtn.addEventListener('click',()=>placeNum(0));
autoNoteBtn.addEventListener('click',autoNotes);
hintBtn.addEventListener('click',useHint);
newBtn.addEventListener('click',()=>init(false));
pauseBtn.addEventListener('click',togglePause);

document.addEventListener('keydown',e=>{
  if(e.target.closest('select,input'))return;
  const n=+e.key;
  if(n>=1&&n<=9)placeNum(n);
  else if(e.key==='Backspace'||e.key==='Delete'||e.key==='0')placeNum(0);
  else if(e.key==='z'&&(e.ctrlKey||e.metaKey)){e.preventDefault();undo()}
  else if(e.key==='n'||e.key==='N'){noteMode=!noteMode;modeBtn.textContent=noteMode?'填入':'备注';modeBtn.classList.toggle('active',noteMode)}
  else if(e.key==='ArrowUp'&&selR>0)selectCell(selR-1,selC);
  else if(e.key==='ArrowDown'&&selR<8)selectCell(selR+1,selC);
  else if(e.key==='ArrowLeft'&&selC>0)selectCell(selR,selC-1);
  else if(e.key==='ArrowRight'&&selC<8)selectCell(selR,selC+1);
  else if(e.key==='Escape')togglePause();
});

const saved=loadGame();
if(saved&&saved.solution){initFromSave(saved);init(true)}else init(false);
</script>
