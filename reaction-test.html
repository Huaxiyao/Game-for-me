<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>反应速度测试</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a0a0a;
  --card: #1a1d23;
  --card-border: rgba(255,255,255,0.06);
  --text: #f1f5f9;
  --text-dim: #64748b;
  --text-muted: #475569;
  --accent: #3b82f6;
  --accent-hover: #2563eb;
  --green-header: #276732;
  --btn-bg: #2a2d35;
  --btn-hover: #353840;
  --btn-text: #888;
  --desc-text: #999;
  --test-bg: #4a6fa5;
  --countdown-bg: #0f1219;
  --chart-bg: #1a1d23;
  --stat-best: #22c55e;
  --stat-worst: #ef4444;
  --hl-red: #dc2626;
  --hl-green: #16a34a;
}
[data-theme="light"] {
  --bg: #e8edf5;
  --card: #ffffff;
  --card-border: rgba(0,0,0,0.08);
  --text: #1e293b;
  --text-dim: #64748b;
  --text-muted: #94a3b8;
  --accent: #3b82f6;
  --accent-hover: #2563eb;
  --green-header: #16a34a;
  --btn-bg: #f1f5f9;
  --btn-hover: #e2e8f0;
  --btn-text: #64748b;
  --desc-text: #64748b;
  --test-bg: #4a6fa5;
  --countdown-bg: #f1f5f9;
  --chart-bg: #f8fafc;
  --stat-best: #16a34a;
  --stat-worst: #dc2626;
  --hl-red: #dc2626;
  --hl-green: #16a34a;
}
body {
  font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  min-height: 100vh;
  background: var(--bg);
  display: flex;
  justify-content: center;
  align-items: center;
  user-select: none;
  transition: background 0.3s;
}
.container {
  width: 100%;
  max-width: 720px;
  padding: 20px;
}

/* ===== 主题切换 ===== */
.theme-toggle {
  position: fixed;
  top: 16px;
  right: 16px;
  z-index: 200;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: 2px solid var(--card-border);
  background: var(--card);
  color: var(--text-dim);
  font-size: 20px;
  cursor: pointer;
  display: flex;
  justify-content: center;
  align-items: center;
  transition: all 0.2s;
  box-shadow: 0 2px 12px rgba(0,0,0,0.15);
}
.theme-toggle:hover {
  background: var(--btn-hover);
  color: var(--text);
}

/* ===== 首页卡片 ===== */
.landing-card {
  border-radius: 16px;
  overflow: hidden;
  background: var(--card);
  box-shadow: 0 8px 40px rgba(0,0,0,0.3);
  border: 1px solid var(--card-border);
  transition: background 0.3s, border-color 0.3s;
}
.landing-header {
  background: var(--green-header);
  padding: 18px 24px;
  text-align: center;
  transition: background 0.3s;
}
.landing-header h1 {
  font-size: 24px;
  font-weight: 700;
  color: #fff;
  letter-spacing: 1px;
}
.landing-body {
  padding: 28px 32px 36px;
}
.attempts-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  margin-bottom: 28px;
  flex-wrap: wrap;
}
.attempts-label {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-dim);
  margin-right: 4px;
  transition: color 0.3s;
}
.attempt-btn {
  min-width: 42px;
  height: 38px;
  padding: 0 10px;
  border: none;
  border-radius: 8px;
  background: var(--btn-bg);
  color: var(--btn-text);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}
.attempt-btn:hover {
  background: var(--btn-hover);
  color: var(--text);
}
.attempt-btn.active {
  background: var(--accent);
  color: #fff;
}
.game-desc {
  font-size: 15px;
  line-height: 1.9;
  color: var(--desc-text);
  margin-bottom: 8px;
  transition: color 0.3s;
}
.game-desc .hl-red {
  background: var(--hl-red);
  color: #fff;
  padding: 1px 8px;
  border-radius: 4px;
  font-weight: 600;
  font-size: 13px;
}
.game-desc .hl-green {
  background: var(--hl-green);
  color: #fff;
  padding: 1px 8px;
  border-radius: 4px;
  font-weight: 600;
  font-size: 13px;
}
.game-desc strong { color: var(--text); }
.game-desc .dim { color: var(--text-muted); font-size: 14px; }
.start-btn {
  display: block;
  width: 200px;
  margin: 28px auto 0;
  padding: 14px 0;
  border: none;
  border-radius: 10px;
  background: var(--accent);
  color: #fff;
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 1px;
}
.start-btn:hover {
  background: var(--accent-hover);
  box-shadow: 0 4px 24px rgba(59,130,246,0.4);
  transform: translateY(-1px);
}

/* ===== 全屏页面通用 ===== */
.fullscreen {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 100;
  opacity: 0;
  animation: fadeIn 0.25s forwards;
}
@keyframes fadeIn {
  to { opacity: 1; }
}

/* ===== 准备页 ===== */
.ready-screen { background: var(--test-bg); }
.ready-text {
  font-size: 32px;
  font-weight: 600;
  color: rgba(255,255,255,0.55);
}

/* ===== 测试页 ===== */
.test-screen { background: var(--test-bg); }
.test-status {
  font-size: 32px;
  font-weight: 600;
  color: #fff;
  margin-bottom: 40px;
  letter-spacing: 0.5px;
}
.test-round {
  font-size: 16px;
  font-weight: 600;
  color: rgba(255,255,255,0.4);
  margin-bottom: 8px;
}
.test-circle {
  width: 280px;
  height: 280px;
  border-radius: 50%;
  cursor: pointer;
  transition: transform 0.15s;
}
.test-circle.waiting {
  background: radial-gradient(circle at 38% 38%, #f87171 0%, #dc2626 60%, #991b1b 100%);
  box-shadow: 0 8px 40px rgba(220,38,38,0.35);
}
.test-circle.ready {
  background: radial-gradient(circle at 38% 38%, #86efac 0%, #22c55e 45%, #15803d 100%);
  box-shadow: 0 8px 50px rgba(34,197,94,0.4);
  animation: pulse-green 0.3s ease-out;
}
.test-circle.early {
  background: radial-gradient(circle at 38% 38%, #fde68a 0%, #f59e0b 50%, #b45309 100%);
  box-shadow: 0 8px 40px rgba(245,158,11,0.35);
  animation: shake 0.35s;
}
@keyframes pulse-green {
  0% { transform: scale(0.94); }
  60% { transform: scale(1.04); }
  100% { transform: scale(1); }
}
@keyframes shake {
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
}
.test-hint {
  font-size: 14px;
  color: rgba(255,255,255,0.4);
  margin-top: 32px;
}

/* ===== 倒计时页 ===== */
.countdown-screen { background: var(--countdown-bg); }
.countdown-number {
  font-size: 80px;
  font-weight: 800;
  color: var(--text);
  font-variant-numeric: tabular-nums;
  transition: color 0.3s;
}
.countdown-unit {
  font-size: 24px;
  font-weight: 500;
  color: var(--text-dim);
  margin-left: 4px;
}
.countdown-round {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-dim);
  margin-top: 8px;
}
.countdown-timer {
  font-size: 48px;
  font-weight: 800;
  color: var(--accent);
  margin-top: 20px;
  font-variant-numeric: tabular-nums;
  width: 80px;
  height: 80px;
  border-radius: 50%;
  border: 4px solid rgba(59,130,246,0.25);
  display: flex;
  justify-content: center;
  align-items: center;
}
.countdown-timer-bar {
  width: 200px;
  height: 5px;
  background: rgba(128,128,128,0.15);
  border-radius: 3px;
  margin-top: 14px;
  overflow: hidden;
}
.countdown-timer-bar-inner {
  height: 100%;
  background: var(--accent);
  border-radius: 3px;
  transition: width 0.05s linear;
}
.countdown-chart-wrap {
  margin-top: 24px;
  width: 400px;
  max-width: 90vw;
  background: var(--chart-bg);
  border-radius: 12px;
  padding: 16px;
  border: 1px solid var(--card-border);
  transition: background 0.3s, border-color 0.3s;
}
.countdown-chart-wrap canvas { width: 100%; height: 160px; }

/* ===== 结果页 ===== */
.results-screen { background: var(--bg); }
.results-card {
  width: 720px;
  max-width: 92vw;
  background: var(--card);
  border-radius: 16px;
  padding: 36px 40px;
  display: flex;
  gap: 36px;
  align-items: flex-start;
  box-shadow: 0 12px 48px rgba(0,0,0,0.3);
  border: 1px solid var(--card-border);
  transition: background 0.3s, border-color 0.3s;
}
.results-left { flex: 0 0 240px; }
.results-avg {
  font-size: 80px;
  font-weight: 800;
  color: var(--text);
  line-height: 1;
  font-variant-numeric: tabular-nums;
  transition: color 0.3s;
}
.results-avg-unit {
  font-size: 28px;
  font-weight: 500;
  color: var(--text-dim);
  margin-left: 2px;
}
.results-grade {
  margin-top: 14px;
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 0.5px;
}
.results-comment {
  font-size: 13px;
  color: var(--text-dim);
  margin-top: 6px;
  line-height: 1.6;
}
.results-stats-row {
  display: flex;
  gap: 18px;
  margin-top: 20px;
}
.results-stat-item { text-align: left; }
.results-stat-label {
  font-size: 11px;
  color: var(--text-dim);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 3px;
}
.results-stat-val {
  font-size: 22px;
  font-weight: 800;
  font-variant-numeric: tabular-nums;
}
.results-stat-val.best { color: var(--stat-best); }
.results-stat-val.avg-c { color: var(--text); }
.results-stat-val.worst { color: var(--stat-worst); }
.results-rounds {
  margin-top: 16px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.round-tag {
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
  background: var(--btn-bg);
  color: var(--text-dim);
  transition: background 0.3s, color 0.3s;
}
.round-tag.tag-best {
  background: rgba(34,197,94,0.15);
  color: var(--stat-best);
}
.round-tag.tag-worst {
  background: rgba(239,68,68,0.15);
  color: var(--stat-worst);
}
.results-right {
  flex: 1;
  min-width: 0;
}
.results-right canvas { width: 100%; height: 240px; }
.restart-btn {
  display: block;
  margin: 24px auto 0;
  padding: 12px 40px;
  border: none;
  border-radius: 10px;
  background: var(--accent);
  color: #fff;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
}
.restart-btn:hover {
  background: var(--accent-hover);
  box-shadow: 0 4px 20px rgba(59,130,246,0.4);
  transform: translateY(-1px);
}

@media (max-width: 600px) {
  .landing-body { padding: 20px 18px 28px; }
  .attempt-btn { min-width: 36px; height: 34px; font-size: 13px; }
  .test-circle { width: 220px; height: 220px; }
  .results-card { flex-direction: column; padding: 28px 24px; }
  .results-left { flex: none; width: 100%; }
  .results-avg { font-size: 56px; }
  .results-right canvas { height: 180px; }
}
</style>
</head>
<body>
<button class="theme-toggle" id="themeBtn" title="切换主题"></button>
<div class="container" id="app"></div>

<script>
const app = document.getElementById('app');
const html = document.documentElement;
const themeBtn = document.getElementById('themeBtn');

let theme = 'dark';
function setTheme(t) {
  theme = t;
  html.setAttribute('data-theme', t);
  themeBtn.textContent = t === 'dark' ? '☀' : '🌙';
  localStorage.setItem('rt_theme', t);
}
themeBtn.addEventListener('click', () => setTheme(theme === 'dark' ? 'light' : 'dark'));
setTheme(localStorage.getItem('rt_theme') || 'dark');

let totalRounds = 5;
let state = 'landing';
let results = [];
let currentRound = 0;
let earlyCount = 0;
let cancelTimer = null;
let readyAt = 0;
let countdownStart = 0;
let countdownRaf = null;
let globalClickHandler = null;

function rafTimeout(fn, ms) {
  const t = performance.now() + ms;
  let on = true;
  function tick() {
    if (!on) return;
    if (performance.now() >= t) { fn(); return; }
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
  return () => { on = false; };
}

function setClick(h) {
  if (globalClickHandler) document.removeEventListener('pointerdown', globalClickHandler);
  globalClickHandler = h;
  document.addEventListener('pointerdown', h);
}
function clearClick() {
  if (globalClickHandler) { document.removeEventListener('pointerdown', globalClickHandler); globalClickHandler = null; }
}

function render() {
  if (cancelTimer && state !== 'waiting' && state !== 'early') { cancelTimer(); cancelTimer = null; }
  if (countdownRaf) { cancelAnimationFrame(countdownRaf); countdownRaf = null; }
  clearClick();
  if (state === 'landing') renderLanding();
  else if (state === 'ready-page') renderReady();
  else if (state === 'waiting' || state === 'ready' || state === 'early') renderTest();
  else if (state === 'countdown') renderCountdown();
  else if (state === 'results') renderResults();
}

/* ===== 首页 ===== */
function renderLanding() {
  const rounds = [3,5,10,15,20,30,100];
  app.innerHTML = `
    <div class="landing-card">
      <div class="landing-header"><h1>反应速度测试</h1></div>
      <div class="landing-body">
        <div class="attempts-row">
          <span class="attempts-label">尝试次数:</span>
          ${rounds.map(n => `<button class="attempt-btn ${totalRounds===n?'active':''}" data-n="${n}">${n}</button>`).join('')}
        </div>
        <p class="game-desc">
          本测试通过一个简单的视觉刺激来测试您的反应速度。这个测试的规则非常简单：当
          <span class="hl-red">红色圆</span> 变成 <span class="hl-green">绿色圆</span>，以最快的速度点击1次屏幕，点任意位置都可以。
          <strong>以上规则反复${totalRounds}次后，取平均成绩为测试结果。</strong>
        </p>
        <p class="game-desc dim">
          据统计，12岁到60岁的人类平均反应速度是<strong>250毫秒</strong>，最高纪录是<strong>120毫秒</strong>，来看看你的吧。
        </p>
        <button class="start-btn" id="startBtn">开始测试</button>
      </div>
    </div>
  `;
  app.querySelectorAll('.attempt-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      totalRounds = parseInt(btn.dataset.n);
      render();
    });
  });
  document.getElementById('startBtn').addEventListener('click', (e) => {
    e.stopPropagation();
    state = 'ready-page';
    render();
  });
}

/* ===== 准备页 ===== */
function renderReady() {
  app.innerHTML = `<div class="fullscreen ready-screen"><div class="ready-text">点任何地方开始测试</div></div>`;
  setClick((e) => { e.preventDefault(); beginTest(); });
}

function beginTest() {
  results = [];
  currentRound = 0;
  earlyCount = 0;
  startNextRound();
}

function startNextRound() {
  if (currentRound >= totalRounds) {
    state = 'results';
    render();
    return;
  }
  state = 'waiting';
  render();
  cancelTimer = rafTimeout(() => {
    state = 'ready';
    readyAt = performance.now();
    render();
  }, 500 + Math.random() * 2000);
}

/* ===== 测试中 ===== */
function renderTest() {
  const isWaiting = state === 'waiting';
  const circleClass = isWaiting ? 'waiting' : state === 'ready' ? 'ready' : 'early';
  const statusText = isWaiting ? '等待变绿...' : state === 'ready' ? '现在！' : '太早了！';

  app.innerHTML = `
    <div class="fullscreen test-screen">
      <div class="test-round">${currentRound + 1} / ${totalRounds}</div>
      <div class="test-status">${statusText}</div>
      <div class="test-circle ${circleClass}"></div>
      <div class="test-hint">红色变绿色时尽快点击</div>
    </div>
  `;

  setClick((e) => { e.preventDefault(); handleClick(performance.now()); });
}

function handleClick(ts) {
  if (cancelTimer) { cancelTimer(); cancelTimer = null; }

  if (state === 'waiting') {
    earlyCount++;
    state = 'early';
    render();
    cancelTimer = rafTimeout(() => startNextRound(), 600);
    return;
  }
  if (state === 'ready') {
    const ms = Math.round(ts - readyAt);
    results.push(ms);
    currentRound++;
    state = 'countdown';
    countdownStart = performance.now();
    render();
    return;
  }
  if (state === 'early') {
    startNextRound();
  }
}

/* ===== 倒计时 ===== */
function renderCountdown() {
  const lastMs = results[results.length - 1];
  const showChart = results.length >= 2;

  app.innerHTML = `
    <div class="fullscreen countdown-screen">
      <div>
        <span class="countdown-number">${lastMs}</span>
        <span class="countdown-unit">ms</span>
      </div>
      <div class="countdown-round">${currentRound} / ${totalRounds}</div>
      <div class="countdown-timer" id="timerNum">3</div>
      <div class="countdown-timer-bar"><div class="countdown-timer-bar-inner" id="timerBar" style="width:100%"></div></div>
      ${showChart ? '<div class="countdown-chart-wrap"><canvas id="miniChart"></canvas></div>' : ''}
    </div>
  `;

  if (showChart) drawChart('miniChart', results, 160);

  const timerNum = document.getElementById('timerNum');
  const timerBar = document.getElementById('timerBar');
  const duration = 3000;
  function tick() {
    const elapsed = performance.now() - countdownStart;
    const remain = Math.max(0, duration - elapsed);
    const sec = Math.ceil(remain / 1000);
    if (timerNum) timerNum.textContent = sec;
    if (timerBar) timerBar.style.width = ((remain / duration) * 100) + '%';
    if (remain > 0) {
      countdownRaf = requestAnimationFrame(tick);
    } else {
      startNextRound();
    }
  }
  countdownRaf = requestAnimationFrame(tick);
}

/* ===== 折线图 ===== */
function drawChart(id, data, h, isLight) {
  const c = document.getElementById(id);
  if (!c) return;
  const dpr = window.devicePixelRatio || 1;
  const rect = c.getBoundingClientRect();
  c.width = rect.width * dpr;
  c.height = h * dpr;
  const ctx = c.getContext('2d');
  ctx.scale(dpr, dpr);
  const w = rect.width;
  const pad = { t: 24, r: 16, b: 28, l: 44 };
  const cw = w - pad.l - pad.r;
  const ch = h - pad.t - pad.b;

  const mn = Math.min(...data) * 0.85;
  const mx = Math.max(...data) * 1.15;
  const rng = mx - mn || 1;

  const gridColor = isLight ? 'rgba(0,0,0,0.08)' : 'rgba(255,255,255,0.08)';
  const labelColor = isLight ? '#94a3b8' : '#64748b';

  ctx.strokeStyle = gridColor;
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 4]);
  for (let i = 0; i <= 4; i++) {
    const y = pad.t + (ch / 4) * i;
    ctx.beginPath();
    ctx.moveTo(pad.l, y);
    ctx.lineTo(w - pad.r, y);
    ctx.stroke();
    ctx.fillStyle = labelColor;
    ctx.font = '11px Inter, sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(Math.round(mx - (rng / 4) * i), pad.l - 8, y + 4);
  }
  ctx.setLineDash([]);

  ctx.fillStyle = labelColor;
  ctx.font = '11px Inter, sans-serif';
  ctx.textAlign = 'center';
  data.forEach((_, i) => {
    const x = pad.l + (cw / (data.length - 1 || 1)) * i;
    ctx.fillText(i + 1, x, h - 6);
  });

  const pts = data.map((v, i) => ({
    x: pad.l + (cw / (data.length - 1 || 1)) * i,
    y: pad.t + ch - ((v - mn) / rng) * ch
  }));

  if (pts.length > 1) {
    const grad = ctx.createLinearGradient(0, pad.t, 0, pad.t + ch);
    grad.addColorStop(0, 'rgba(59,130,246,0.12)');
    grad.addColorStop(1, 'rgba(59,130,246,0)');
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pad.t + ch);
    pts.forEach(p => ctx.lineTo(p.x, p.y));
    ctx.lineTo(pts[pts.length-1].x, pad.t + ch);
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < pts.length; i++) {
      const mx2 = (pts[i-1].x + pts[i].x) / 2;
      ctx.bezierCurveTo(mx2, pts[i-1].y, mx2, pts[i].y, pts[i].x, pts[i].y);
    }
    ctx.strokeStyle = '#3b82f6';
    ctx.lineWidth = 2.5;
    ctx.stroke();
  }

  pts.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
    ctx.fillStyle = '#3b82f6';
    ctx.fill();
    ctx.strokeStyle = theme === 'dark' ? '#1a1f2e' : '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();
  });
}

/* ===== 评价系统 ===== */
function getGrade(avg) {
  if (avg < 150) return { level: 'S', color: '#f59e0b', label: '超凡反应', comment: '你的反应速度远超常人，堪称天赋异禀。绝大多数人穷其一生也无法达到这个水平。' };
  if (avg < 180) return { level: 'A+', color: '#22c55e', label: '顶尖水准', comment: '非常出色的反应速度！你具备职业电竞选手或专业运动员级别的神经反射能力。' };
  if (avg < 210) return { level: 'A', color: '#22c55e', label: '非常优秀', comment: '你的反应速度明显优于大多数人，在需要快速反应的场景中你会有明显优势。' };
  if (avg < 240) return { level: 'B+', color: '#3b82f6', label: '高于平均', comment: '不错的成绩，你的反应速度高于普通人的平均水平，保持良好状态可以更快。' };
  if (avg < 270) return { level: 'B', color: '#3b82f6', label: '中等偏上', comment: '处于正常范围的中上水平，通过专注训练和充足休息可以进一步提升。' };
  if (avg < 300) return { level: 'C', color: '#64748b', label: '正常水平', comment: '你的反应速度处于大众平均水平，日常活动完全够用，无需担心。' };
  if (avg < 350) return { level: 'D', color: '#94a3b8', label: '有待提升', comment: '反应速度略低于平均，可能是疲劳或注意力不集中导致，充分休息后再试试。' };
  return { level: 'E', color: '#ef4444', label: '需要关注', comment: '反应偏慢，建议保证充足睡眠、减少屏幕使用时间，如持续偏低可咨询医生。' };
}

/* ===== 结果页 ===== */
function renderResults() {
  const best = Math.min(...results);
  const worst = Math.max(...results);
  const avg = Math.round(results.reduce((a, b) => a + b, 0) / results.length);
  const grade = getGrade(avg);

  app.innerHTML = `
    <div class="fullscreen results-screen">
      <div style="display:flex;flex-direction:column;align-items:center">
        <div class="results-card">
          <div class="results-left">
            <div><span class="results-avg">${avg}</span><span class="results-avg-unit">ms</span></div>
            <div class="results-grade" style="color:${grade.color}">${grade.level} · ${grade.label}</div>
            <div class="results-comment">${grade.comment}</div>
            <div class="results-stats-row">
              <div class="results-stat-item">
                <div class="results-stat-label">最快</div>
                <div class="results-stat-val best">${best}<small style="font-size:13px;font-weight:500;color:var(--text-dim)"> ms</small></div>
              </div>
              <div class="results-stat-item">
                <div class="results-stat-label">平均</div>
                <div class="results-stat-val avg-c">${avg}<small style="font-size:13px;font-weight:500;color:var(--text-dim)"> ms</small></div>
              </div>
              <div class="results-stat-item">
                <div class="results-stat-label">最慢</div>
                <div class="results-stat-val worst">${worst}<small style="font-size:13px;font-weight:500;color:var(--text-dim)"> ms</small></div>
              </div>
            </div>
            <div class="results-rounds">
              ${results.map((r, i) => {
                let cls = '';
                if (r === best) cls = 'tag-best';
                else if (r === worst && results.length > 1) cls = 'tag-worst';
                return `<span class="round-tag ${cls}">#${i+1} ${r}ms</span>`;
              }).join('')}
            </div>
          </div>
          <div class="results-right"><canvas id="finalChart"></canvas></div>
        </div>
        <button class="restart-btn" id="restartBtn">重新测试</button>
      </div>
    </div>
  `;

  drawChart('finalChart', results, 240, theme === 'light');
  document.getElementById('restartBtn').addEventListener('click', (e) => {
    e.stopPropagation();
    state = 'landing';
    render();
  });
}

/* ===== 键盘支持 ===== */
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    if (state === 'ready-page') beginTest();
    else if (state === 'waiting' || state === 'ready' || state === 'early') handleClick(performance.now());
  }
});

render();
</script>
</body>
</html>
